function Dashboard({ dashboard, dashboardId, extras, replacements, onDrill, onRemoveWidget, replaceTarget, onPerformReplace, onCancelReplace, titleOverride, widgetTitleOverrides, widgetSizeOverrides, widgetOrder, onRenameDashboard, onRenameWidget, onResizeWidget, onReorderWidget, onSaveChanges, hasUnsavedChanges, isSavedToMyDashboards, editLog }) {
  const baseCount = dashboard.widgets.length;
  const merged = [...dashboard.widgets, ...(extras || [])];
  const widgets = merged.map((w, i) => (replacements && replacements[i]) ? replacements[i] : w);
  const inReplaceMode = !!replaceTarget;
  const effectiveTitle = titleOverride || dashboard.title;
  const order = (widgetOrder && widgetOrder.length === widgets.length) ? widgetOrder : widgets.map((_, i) => i);
  /* A report can only be modified — and so can only ever have unsaved
     changes to show a Save button for — if it's owned by the user or
     shared with edit access. ensureEditableCopy() clones a Netskope Library
     template into an owned copy on first edit, so this is already true by
     the time any edit has actually applied. */
  const canEdit = isSavedToMyDashboards || !!SHARED_REPORT_ACCESS[dashboardId];
  const [dragFrom, setDragFrom] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [historyOpen, setHistoryOpen] = useState(false);
  const historyRef = useRef(null);
  useClickOutside(historyRef, () => setHistoryOpen(false));
  const widgetRefs = useRef([]);

  const startDrag = (fromIdx) => {
    setDragFrom(fromIdx);
    setDragOver(null);
    let currentOver = null;
    const onMove = (e) => {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      let node = el;
      let found = null;
      while (node && node !== document.body) {
        if (node.dataset && node.dataset.widgetIdx != null) {
          found = parseInt(node.dataset.widgetIdx, 10);
          break;
        }
        node = node.parentElement;
      }
      if (found !== currentOver) {
        currentOver = found;
        setDragOver(found);
      }
    };
    const onUp = () => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      if (currentOver != null && currentOver !== fromIdx && onReorderWidget) {
        onReorderWidget(dashboardId, fromIdx, currentOver);
      }
      setDragFrom(null);
      setDragOver(null);
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    document.body.style.cursor = "grabbing";
    document.body.style.userSelect = "none";
  };
  return (
    <div className="max-w-6xl mx-auto px-6 py-6">
      {inReplaceMode && (
        <div className="mb-4 flex items-center justify-between gap-3 px-4 py-2.5 rounded-lg border border-blue-200 bg-blue-50">
          <div className="flex items-center gap-2 min-w-0 text-[13px] text-blue-900">
            <span className="text-blue-600 flex-shrink-0">{I.refresh}</span>
            <span className="truncate">Click a widget to replace it with <span className="font-semibold">"{replaceTarget.response.title}"</span> · press Esc to cancel</span>
          </div>
          <button onClick={onCancelReplace}
            className="text-[12px] font-medium text-blue-700 hover:bg-blue-100 px-2 py-1 rounded focus-ring flex-shrink-0">
            Cancel
          </button>
        </div>
      )}
      <div className="mb-5 flex items-start justify-between gap-4">
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-2 flex-wrap">
            <h1 className="text-xl font-semibold text-slate-900">
              {onRenameDashboard
                ? <EditableTitle value={effectiveTitle} onSave={(t) => onRenameDashboard(dashboardId, t)} className="text-xl font-semibold text-slate-900" inputClassName="text-xl font-semibold text-slate-900 w-full" />
                : effectiveTitle}
            </h1>
            {REPORT_ABOUT[dashboardId] && (
              <span className="inline-flex items-center gap-1 text-[10.5px] font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 border border-slate-200 flex-shrink-0"
                    title="This report is based on a template from the Netskope report library">
                {React.cloneElement(I.book, { className: "w-3 h-3" })}
                {isSavedToMyDashboards ? "Based on a Netskope Library template" : "Netskope Library"}
              </span>
            )}
          </div>
          <p className="text-[13px] text-slate-500 mt-1">{dashboard.description}</p>
          {REPORT_ABOUT[dashboardId] && (
            <details className="mt-2 group/about">
              <summary className="cursor-pointer inline-flex items-center gap-1 text-[12px] text-slate-500 hover:text-slate-700 font-medium focus-ring rounded select-none">
                <svg className="w-3 h-3 transition-transform group-open/about:rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>
                About this report
              </summary>
              <div className="mt-2 max-w-2xl bg-white border border-slate-200 rounded-lg p-3.5 text-[12.5px] text-slate-600 leading-relaxed">
                <p>{REPORT_ABOUT[dashboardId].blurb} Some questions answered include:</p>
                <ul className="mt-1.5 space-y-1 list-disc pl-4 text-slate-500">
                  {REPORT_ABOUT[dashboardId].questions.map((q, i) => <li key={i}>{q}</li>)}
                </ul>
              </div>
            </details>
          )}
        </div>
        <div className="flex items-center gap-2 flex-shrink-0">
          {/* Edit history — Google-Docs-style attributed activity log. Only
              rendered once the report has any history (templates start clean). */}
          {editLog && editLog.length > 0 && (
            <div className="relative" ref={historyRef}>
              <button onClick={() => setHistoryOpen(o => !o)}
                title="View edit history"
                className="inline-flex items-center gap-1.5 text-[12px] text-slate-500 hover:text-slate-800 px-2.5 py-1.5 rounded-lg hover:bg-slate-100 transition-colors focus-ring">
                {React.cloneElement(I.history, { className: "w-3.5 h-3.5" })}
                <span>Edited by {editLog[0].who === "You" ? "you" : editLog[0].who.split("@")[0]} · {editLog[0].when.split(" · ")[0].toLowerCase()}</span>
              </button>
              {historyOpen && (
                <div className="menu-pop absolute right-0 mt-1 w-96 bg-white border border-slate-200 rounded-xl card-shadow z-30 overflow-hidden">
                  <div className="px-4 py-2.5 border-b border-slate-100 text-[12px] font-semibold text-slate-700 flex items-center gap-1.5">
                    {React.cloneElement(I.history, { className: "w-3.5 h-3.5 text-slate-400" })}Edit history
                  </div>
                  <div className="max-h-80 overflow-y-auto py-1">
                    {editLog.map((e, i) => (
                      <div key={i} className="px-4 py-2 hover:bg-slate-50">
                        <div className="text-[12.5px] text-slate-700 leading-snug">{e.action}</div>
                        <div className="text-[11px] text-slate-400 mt-0.5">
                          <span className={e.who === "You" ? "text-blue-600 font-medium" : ""}>{e.who}</span> · {e.when}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
          {hasUnsavedChanges && canEdit && onSaveChanges && (
            <button onClick={onSaveChanges} title="Save changes to this report"
              className="inline-flex items-center gap-1.5 text-[12.5px] font-medium px-3 py-1.5 rounded-lg border border-blue-600 bg-blue-600 hover:bg-blue-700 text-white transition-all">
              {I.save} Save
            </button>
          )}
          <ShareDashboardMenu dashboard={dashboard} />
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, minmax(0, 1fr))", gap: "0.75rem" }}>
        {order.map((origIdx, displayIdx) => {
          const w = widgets[origIdx];
          const added = origIdx >= baseCount;
          const titleOverride = widgetTitleOverrides && widgetTitleOverrides[origIdx];
          const sizeOverride = widgetSizeOverrides && widgetSizeOverrides[origIdx];
          const effective = { ...w, ...(titleOverride ? { title: titleOverride } : {}), ...(sizeOverride ? { size: sizeOverride } : {}) };
          const dragEnabled = !!onReorderWidget && !inReplaceMode;
          return <Widget key={origIdx} widget={effective} added={added} onDrill={onDrill}
                         onRemove={added && onRemoveWidget && !inReplaceMode ? () => onRemoveWidget(origIdx - baseCount) : null}
                         replaceMode={inReplaceMode}
                         onReplaceClick={inReplaceMode ? () => onPerformReplace(origIdx) : null}
                         onRename={onRenameWidget && !inReplaceMode ? (newTitle) => onRenameWidget(dashboardId, origIdx, newTitle) : null}
                         onResize={onResizeWidget && !inReplaceMode ? (newSize) => onResizeWidget(dashboardId, origIdx, newSize) : null}
                         dragEnabled={dragEnabled}
                         isDragging={dragFrom === displayIdx}
                         isDropTarget={dragOver === displayIdx && dragFrom != null && dragFrom !== displayIdx}
                         widgetRef={(el) => { widgetRefs.current[displayIdx] = el; }}
                         displayIdx={displayIdx}
                         onDragHandleMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); startDrag(displayIdx); }} />;
        })}
      </div>
    </div>
  );
}

/* Dual-pane layout — dashboard pinned to the main canvas (left), chat
   continues on the right. Both toolbars are removed; a small floating
   Close button in the top-right corner of the canvas exits dashboard mode.
   Empty chat state shows a hint so the user knows they can ask follow-ups. */
function DualPane({ activeDashboard, messages, loading, onSend, onPickFollowup, onPickPrompt, scrollRef, dashboardExtras, dashboardReplacements, onAddToDashboard, activeDashboardId, activeDashboardTitle, onRemoveWidget, onSaveWidget, onStartReplace, replaceTarget, onPerformReplace, onCancelReplace, dashboardTitleOverride, widgetTitleOverrides, widgetSizeOverrides, widgetOrder, onRenameDashboard, onRenameWidget, onResizeWidget, onReorderWidget, libraryItems, personaId, onSaveChanges, hasUnsavedChanges, isSavedToMyDashboards, editLog, myReports = [], onSaveToReport, onCreateReport }) {
  const dashboard = DASHBOARDS[activeDashboard.dashboardId];
  const containerRef = useRef(null);
  const [chatWidth, setChatWidth] = useState(420);
  const [dragging, setDragging] = useState(false);
  const isSecurityLeader = personaId === "luke" || personaId === "secengineer" || personaId === "ciso" || personaId === "secleader" || personaId === "genaiadmin";
  const [chatOpen, setChatOpen] = useState(true);
  if (!dashboard) return null;
  const isEmpty = messages.length === 0 && !loading;

  const startDrag = (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startWidth = chatWidth;
    setDragging(true);
    const onMove = (ev) => {
      const containerW = containerRef.current?.offsetWidth || 1000;
      const delta = startX - ev.clientX;
      const next = Math.max(320, Math.min(Math.round(containerW * 0.65), startWidth + delta));
      setChatWidth(next);
    };
    const onUp = () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      setDragging(false);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  };

  const assistantHeader = (onCollapse) => (
    <div className="flex items-center gap-2 px-4 py-3 border-b border-slate-200 flex-shrink-0">
      <div className="w-6 h-6 rounded bg-blue-50 text-blue-600 grid place-items-center flex-shrink-0">{I.spark}</div>
      <div className="min-w-0 flex-1">
        <div className="text-[12.5px] font-semibold text-slate-900 leading-tight">AI Assistant</div>
      </div>
      {onCollapse && (
        <button onClick={onCollapse} title="Collapse AI Assistant"
          className="text-slate-400 hover:text-slate-600 transition-colors p-0.5 rounded focus:outline-none focus:ring-2 focus:ring-blue-200">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75} strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
            <path d="M6 17l5-5-5-5M13 17l5-5-5-5" />
          </svg>
        </button>
      )}
    </div>
  );

  const conversationPanel = (
    <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
      {isEmpty ? (
        <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
          <div className="w-10 h-10 rounded-full bg-blue-50 text-blue-600 grid place-items-center mb-3">{I.spark}</div>
          <p className="text-[13px] text-slate-700 font-medium">Ask anything about this dashboard</p>
          <p className="text-[12px] text-slate-400 mt-1">Drill into a widget, change a filter, or pick one of the suggested follow-ups.</p>
        </div>
      ) : (
        <Conversation messages={messages} loading={loading} onPickFollowup={onPickFollowup}
                      scrollRef={scrollRef} onAddToDashboard={onAddToDashboard}
                      activeDashboardId={activeDashboardId} activeDashboardTitle={activeDashboardTitle}
                      onStartReplace={onStartReplace} onSaveWidget={onSaveWidget}
                      myReports={myReports} onSaveToReport={onSaveToReport} onCreateReport={onCreateReport} />
      )}
      <PromptInput onSend={onSend} busy={loading} onPickPrompt={onPickPrompt} libraryItems={libraryItems} />
    </div>
  );

  return (
    <div ref={containerRef} className="flex-1 flex overflow-hidden min-h-0">
      {/* Main canvas */}
      <div className="flex-1 flex flex-col min-w-0">
        <div className={`flex-1 overflow-y-auto ${dashboard.widgets.length === 0 ? "large-grid-bg" : "grid-bg"}`}>
          <Dashboard dashboard={dashboard} dashboardId={activeDashboardId} extras={dashboardExtras} replacements={dashboardReplacements} onDrill={onPickFollowup} onRemoveWidget={onRemoveWidget}
                     replaceTarget={replaceTarget} onPerformReplace={onPerformReplace} onCancelReplace={onCancelReplace}
                     titleOverride={dashboardTitleOverride} widgetTitleOverrides={widgetTitleOverrides} widgetSizeOverrides={widgetSizeOverrides} widgetOrder={widgetOrder}
                     onRenameDashboard={onRenameDashboard} onRenameWidget={onRenameWidget} onResizeWidget={onResizeWidget} onReorderWidget={onReorderWidget}
                     onSaveChanges={onSaveChanges} hasUnsavedChanges={hasUnsavedChanges} isSavedToMyDashboards={isSavedToMyDashboards}
                     editLog={editLog} />
        </div>
      </div>

      {isSecurityLeader ? (
        /* Security Leader: collapsible panel. Open = panel with a collapse
           chevron in its header (no separate rail). Collapsed = slim
           neutral tab. */
        chatOpen ? (
          <>
            {/* Resize handle — division line kept from the prior version */}
            <div
              onMouseDown={startDrag}
              title="Drag to resize the chat panel"
              className={`flex-shrink-0 w-1 cursor-col-resize transition-colors ${dragging ? "bg-blue-500" : "bg-slate-200 hover:bg-blue-400"}`}
            />
            <div style={{ width: chatWidth }} className="flex-shrink-0 flex flex-col bg-white">
              {assistantHeader(() => setChatOpen(false))}
              {conversationPanel}
            </div>
          </>
        ) : (
          <button onClick={() => setChatOpen(true)}
            className="flex-shrink-0 w-12 bg-white border-l border-slate-200 hover:bg-slate-50 flex flex-col items-center pt-4 pb-4 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-200 group"
            title="Open AI Assistant" aria-label="Open AI Assistant">
            <span className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 grid place-items-center group-hover:bg-blue-100">{I.spark}</span>
            <span className="text-[10px] font-bold tracking-wider text-slate-500 group-hover:text-slate-700 mt-1.5">AI</span>
            <span className="flex-1" />
            <span className="text-[12px] leading-none text-slate-400 group-hover:text-slate-700">«</span>
          </button>
        )
      ) : (
        /* All other personas: always-visible side panel */
        <>
          <div
            onMouseDown={startDrag}
            title="Drag to resize the chat panel"
            className={`flex-shrink-0 w-1 cursor-col-resize transition-colors ${dragging ? "bg-blue-500" : "bg-slate-200 hover:bg-blue-400"}`}
          />
          <div style={{ width: chatWidth }} className="flex-shrink-0 flex flex-col bg-white">
            {assistantHeader(null)}
            {conversationPanel}
          </div>
        </>
      )}
    </div>
  );
}

function AgentPane({ agentMessages, followUpMessages, loading, onSend, onPickFollowup, scrollRef, onAddToDashboard, onSaveWidget, onCreateAgent, onPickPrompt, libraryItems, myReports = [], onSaveToReport, onCreateReport }) {
  const containerRef = useRef(null);
  const [chatWidth, setChatWidth] = useState(360);
  const [chatOpen, setChatOpen] = useState(true);
  const [dragging, setDragging] = useState(false);

  const startDrag = (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startWidth = chatWidth;
    const onMove = (ev) => {
      const containerW = containerRef.current?.offsetWidth || 1000;
      const next = Math.max(280, Math.min(containerW * 0.6, startWidth + (startX - ev.clientX)));
      setChatWidth(next);
    };
    const onUp = () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      setDragging(false);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    setDragging(true);
  };

  const followUpEmpty = followUpMessages.length === 0;

  const assistantHeader = (onCollapse) => (
    <div className="flex items-center gap-2 px-4 py-3 border-b border-slate-200 flex-shrink-0">
      <div className="w-6 h-6 rounded bg-blue-50 text-blue-600 grid place-items-center flex-shrink-0">{I.spark}</div>
      <div className="min-w-0 flex-1">
        <div className="text-[12.5px] font-semibold text-slate-900 leading-tight">AI Assistant</div>
      </div>
      {onCollapse && (
        <button onClick={onCollapse} title="Collapse AI Assistant"
          className="text-slate-400 hover:text-slate-600 transition-colors p-0.5 rounded focus:outline-none focus:ring-2 focus:ring-blue-200">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75} strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
            <path d="M6 17l5-5-5-5M13 17l5-5-5-5" />
          </svg>
        </button>
      )}
    </div>
  );

  const conversationPanel = (
    <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
      {followUpEmpty ? (
        <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
          <div className="w-10 h-10 rounded-full bg-blue-50 text-blue-600 grid place-items-center mb-3">{I.spark}</div>
          <p className="text-[13px] text-slate-700 font-medium">Ask anything about this agent</p>
          <p className="text-[12px] text-slate-400 mt-1">Run the agent, modify settings, or ask follow-up questions.</p>
        </div>
      ) : (
        <Conversation messages={followUpMessages} loading={loading} onPickFollowup={onPickFollowup}
                      scrollRef={scrollRef} onAddToDashboard={onAddToDashboard}
                      onSaveWidget={onSaveWidget} onCreateAgent={onCreateAgent}
                      myReports={myReports} onSaveToReport={onSaveToReport} onCreateReport={onCreateReport} />
      )}
      <PromptInput onSend={onSend} busy={loading} onPickPrompt={onPickPrompt} libraryItems={libraryItems} />
    </div>
  );

  return (
    <div ref={containerRef} className="flex-1 flex overflow-hidden min-h-0">
      {/* Left: agent flow */}
      <div className="flex-1 overflow-y-auto">
        <Conversation messages={agentMessages} loading={false} onPickFollowup={onPickFollowup}
                      scrollRef={null} onAddToDashboard={onAddToDashboard}
                      onSaveWidget={onSaveWidget} onCreateAgent={onCreateAgent}
                      myReports={myReports} onSaveToReport={onSaveToReport} onCreateReport={onCreateReport} />
      </div>

      {/* Right: collapsible AI assistant. Open = panel with a collapse
         chevron in its header; collapsed = slim neutral tab. */}
      {chatOpen ? (
        <>
          <div onMouseDown={startDrag} title="Drag to resize"
            className={`flex-shrink-0 w-1 cursor-col-resize transition-colors ${dragging ? "bg-blue-500" : "bg-slate-200 hover:bg-blue-400"}`} />
          <div style={{ width: chatWidth }} className="flex-shrink-0 flex flex-col bg-white">
            {assistantHeader(() => setChatOpen(false))}
            {conversationPanel}
          </div>
        </>
      ) : (
        <button onClick={() => setChatOpen(true)}
          className="flex-shrink-0 w-12 bg-white border-l border-slate-200 hover:bg-slate-50 flex flex-col items-center pt-4 pb-4 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-200 group"
          title="Open AI Assistant" aria-label="Open AI Assistant">
          <span className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 grid place-items-center group-hover:bg-blue-100">{I.spark}</span>
          <span className="text-[10px] font-bold tracking-wider text-slate-500 group-hover:text-slate-700 mt-1.5">AI</span>
          <span className="flex-1" />
          <span className="text-[12px] leading-none text-slate-400 group-hover:text-slate-700">«</span>
        </button>
      )}
    </div>
  );
}

/* Convert an in-chat response card into a dashboard widget. Returns null
   for response types that don't have a chart payload to add. */
function responseToWidget(r) {
  if (r.chartType === "kpi+line" && r.series) return { type: "line", size: "full", title: r.title, series: r.series, xLabels: r.xLabels || [], anomalies: r.anomalies || [], forecastIndex: r.forecastIndex ?? null };
  if (r.chartType === "kpi"      && r.kpis)   return { type: "kpi", size: "full", title: r.title, kpis: r.kpis };
  if (r.chartType === "hbar"     && r.bars)   return { type: "hbar", size: "full", title: r.title, bars: r.bars };
  if (r.chartType === "donut"    && r.slices) return { type: "donut", size: "half", title: r.title, slices: r.slices };
  if (r.chartType === "table"    && r.table)  return { type: "table", size: "full", title: r.title, columns: r.table.columns, rows: r.table.rows };
  return null;
}

/* Scripted "AI risk" dashboard-creation wizard, triggered from the welcome
   page input box when the prompt contains "ai risk" (case-insensitive).
   Every step's copy is fixed; whatever the user types in response is
   accepted as "the answer" without going through classifyPrompt. */
const AI_RISK_WIZARD = {
  q1: "What type of AI risk are you interested in? For example, risky AI app usage, risky data uploads, policy violations, etc. Based on your answer, I will select appropriate data collections for the dashboard.",
  a1: "Got it. Based on your answer, Application Events and Alerts are the best options. I will create the dashboard based on these two data collections.",
  q2: "Who is the target audience? For example, IT analyst, security leader, CISO, etc. Based on your answer, I will determine the key metrics of the dashboard.",
  a2: "Got it. Based on your answer, I will create the dashboard with a focus on risky AI app usage overview, CCL breakdown, and DLP policy violations.",
  q3: "While I am finalizing the dashboard, do you have any additional requirements?",
  a3: "Got it. AI risk attribute can help you understand why your AI usage is risky. I will add this to the dashboard.",
  done: "I have created this AI Risk Assessment Dashboard for your use case. Please review.",
};

function App() {
  const toast = useToast();
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [activeDashboard, setActiveDashboard] = useState(null);
  const [dashboardExtras, setDashboardExtras] = useState({});
  const [dashboardReplacements, setDashboardReplacements] = useState({});
  const [dashboardTitleOverrides, setDashboardTitleOverrides] = useState({});
  const [widgetTitleOverrides, setWidgetTitleOverrides] = useState({});
  const [widgetSizeOverrides, setWidgetSizeOverrides] = useState({});
  const [widgetOrderOverrides, setWidgetOrderOverrides] = useState({});
  const [replaceTarget, setReplaceTarget] = useState(null);
  const [savedWidgets, setSavedWidgets] = useState([]);
  const [userAgents, setUserAgents] = useState([]);
  const [favoriteDashboardIds, setFavoriteDashboardIds] = useState([]);
  const toggleFavoriteDashboard = (dashboardId) => {
    setFavoriteDashboardIds(prev => prev.includes(dashboardId) ? prev.filter(id => id !== dashboardId) : [...prev, dashboardId]);
  };
  const [myDashboards, setMyDashboards] = useState(() => PERSONAL_DASHBOARDS.filter(Boolean));
  const isDashboardSaved = (dashboardId) => myDashboards.some(d => d.dashboardId === dashboardId);
  /* Per-report edit history (Google-Docs style). Live actions prepend
     { who: "You" } entries onto the seeded collaborator history. */
  const [editLogs, setEditLogs] = useState(() => ({ ...EDIT_LOG_SEED }));
  const logEdit = (dashboardId, action) => {
    setEditLogs(prev => ({
      ...prev,
      [dashboardId]: [{ who: "You", when: "Just now", action }, ...(prev[dashboardId] || [])],
    }));
  };
  /* Unsaved-changes tracking: the Save button in the report header only
     shows once an edit has actually happened this session. Editing itself
     is only possible on a report you own or that's shared with edit access
     (ensureEditableCopy silently clones a Netskope Library template into
     your own copy on first edit, so by the time an edit applies the report
     already qualifies). */
  const [dirtyDashboards, setDirtyDashboards] = useState({});
  const markDirty = (dashboardId) => setDirtyDashboards(prev => prev[dashboardId] ? prev : { ...prev, [dashboardId]: true });
  const saveDashboardChanges = (dashboardId) => {
    setDirtyDashboards(prev => {
      if (!prev[dashboardId]) return prev;
      const next = { ...prev };
      delete next[dashboardId];
      return next;
    });
    toast("Report saved");
  };
  /* Confirm before navigating away from a dashboard with unsaved changes.
     Wraps every in-app "leave the current report" action (Back, New Chat,
     opening a different report/agent, restoring session history, switching
     persona) — if the active report is dirty, the action is stashed and
     only runs once the user confirms leaving anyway. */
  const [pendingLeaveAction, setPendingLeaveAction] = useState(null);
  const guardLeave = (action) => {
    if (activeDashboard && dirtyDashboards[activeDashboard.dashboardId]) {
      setPendingLeaveAction(() => action);
    } else {
      action();
    }
  };
  /* Native browser unload (tab close, reload, typed-in navigation) can't be
     intercepted with a custom modal — the browser shows its own generic
     "leave site?" prompt. Any dirty report is enough to trigger it. */
  useEffect(() => {
    const handler = (e) => {
      if (Object.keys(dirtyDashboards).length > 0) {
        e.preventDefault();
        e.returnValue = "";
      }
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [dirtyDashboards]);
  /* Clone-on-modify: the first edit to a Netskope Library template silently
     saves a copy to My Reports — the user is then editing their copy, and
     the template itself stays pristine. */
  const ensureEditableCopy = (dashboardId) => {
    const item = ALL_DASHBOARD_ITEMS.find(d => d.dashboardId === dashboardId);
    if (!item || isDashboardSaved(dashboardId)) return;
    setMyDashboards(prev => [...prev, {
      dashboardId: item.dashboardId, title: item.title, desc: item.desc, personas: item.personas || [],
    }]);
    logEdit(dashboardId, "Cloned from the Netskope Library template");
    toast("Saved a copy to My Reports — you're editing your copy", { kind: "info" });
  };
  /* Pending "add widget to a shared report" confirmation, shown as a modal. */
  const [pendingSharedAdd, setPendingSharedAdd] = useState(null);
  const [showWelcome, setShowWelcome] = useState(true);
  const [showDashboardGallery, setShowDashboardGallery] = useState(false);
  const [showAgentGallery, setShowAgentGallery] = useState(false);
  const [showHistoryPage, setShowHistoryPage] = useState(false);
  const [showPersonalGallery, setShowPersonalGallery] = useState(false);
  const [showGroupGallery, setShowGroupGallery] = useState(false);
  const [showSharedGallery, setShowSharedGallery] = useState(false);
  const [welcomeChatMode, setWelcomeChatMode] = useState(false);
  const [aiRiskWizardStep, setAiRiskWizardStep] = useState(0); // 0 = inactive, 1/2/3 = waiting for answer to Qn
const [isAgentView, setIsAgentView] = useState(false);
  const [navHistory, setNavHistory] = useState([]);
  const pushHistory = () => {
    setNavHistory(prev => [...prev, { showWelcome, showDashboardGallery, showAgentGallery, showHistoryPage, showPersonalGallery, showGroupGallery, showSharedGallery, activeDashboard, isAgentView }]);
  };
  const clearGalleries = () => { setShowDashboardGallery(false); setShowAgentGallery(false); setShowHistoryPage(false); setShowPersonalGallery(false); setShowGroupGallery(false); setShowSharedGallery(false); setShowWelcome(false); setIsAgentView(false); };
  const goBack = () => guardLeave(() => {
    setNavHistory(prev => {
      if (!prev.length) return prev;
      const snap = prev[prev.length - 1];
      setShowWelcome(snap.showWelcome);
      setShowDashboardGallery(snap.showDashboardGallery);
      setShowAgentGallery(snap.showAgentGallery || false);
      setShowHistoryPage(snap.showHistoryPage || false);
      setShowPersonalGallery(snap.showPersonalGallery || false);
      setShowGroupGallery(snap.showGroupGallery || false);
      setShowSharedGallery(snap.showSharedGallery || false);
      setActiveDashboard(snap.activeDashboard);
      setIsAgentView(snap.isAgentView || false);
      return prev.slice(0, -1);
    });
  });

  const [personaId, setPersonaId] = useState("luke");
  const persona = PERSONAS[personaId] || PERSONAS.luke;
  const onChangePersona = (id) => guardLeave(() => {
    pushHistory();
    setPersonaId(id);
    setMessages([]);
    setShowWelcome(false);
    const DEFAULT_DASHBOARD_BY_PERSONA = {
      luke:       { dashboardId: "soc-dlp-monitoring", title: "Security Operations Analyst", desc: "Policy violations, DLP files, malware, and UEBA alerts" },
      secengineer: { dashboardId: "security-engineer", title: "Data Security Posture Management", desc: "Where sensitive data sits and moves — at-rest exposure, DLP policy coverage, movement to unmanaged apps" },
      ciso:       { dashboardId: "ciso-overview",      title: "CISO Dashboard",                     desc: "Alerts, DLP, threats, policy violations, network traffic · Jun 2025" },
      secleader:  { dashboardId: "security-analyst",   title: "Cloud Risk Assessment",         desc: "Cloud app discovery, DLP, threats, UBA · last 90 days" },
      genaiadmin: { dashboardId: "genai-admin",        title: "AI Usage",                 desc: "Users, top AI apps, activities, and controls · last 7 days" },
    };
    const defaultItem = DEFAULT_DASHBOARD_BY_PERSONA[id] || null;
    setActiveDashboard(defaultItem);
    if (defaultItem) {
      const dash = DASHBOARDS[defaultItem.dashboardId];
      if (dash) setMessages([
        { role: "user", text: `Open the "${defaultItem.title}" dashboard` },
        { role: "ai", text: dash.summary || dash.description, examples: dash.examplePrompts || [] },
      ]);
    }
    toast(`Switched to ${PERSONAS[id].role}`, { kind: "info" });
  });
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, loading]);

  const matchDashboardByKeyword = (text) => {
    const t = text.toLowerCase().trim();
    if (t.length < 2) return null;
    const allItems = DASHBOARD_ITEMS.flatMap(g => g.items.map(d => ({ ...d, folder: g.folder })));
    return allItems.find(d => {
      const extra = (d.keywords || []).map(s => s.toLowerCase());
      if (extra.some(k => {
        const pattern = new RegExp(`\\b${k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\b`, "i");
        return pattern.test(t);
      })) return true;
      const keywords = [
        d.title, d.folder, d.dashboardId.replace(/-/g, " "),
        ...(d.personas || []),
      ].map(s => s.toLowerCase());
      return keywords.some(k => t.includes(k) || (k.length >= 4 && k.includes(t) && t.length >= 3));
    }) || null;
  };

  const widgetToResponse = (widget, sourceDashTitle) => {
    const base = { title: widget.title, summary: `From: ${sourceDashTitle}.`, followUps: [] };
    if (widget.type === "kpi")   return { ...base, chartType: "kpi",      kpis: widget.kpis };
    if (widget.type === "line")  return { ...base, chartType: "kpi+line", series: widget.series, xLabels: widget.xLabels || [], anomalies: widget.anomalies || [], forecastIndex: widget.forecastIndex ?? null };
    if (widget.type === "hbar")  return { ...base, chartType: "hbar",     bars: widget.bars };
    if (widget.type === "donut") return { ...base, chartType: "donut",    slices: widget.slices };
    if (widget.type === "table") return { ...base, chartType: "table",    table: { columns: widget.columns, rows: widget.rows } };
    return null;
  };

  const matchWidgetsFromDashboards = (text) => {
    const words = text.toLowerCase().split(/\W+/).filter(w => w.length >= 2);
    if (!words.length) return [];
    // Also include DASHBOARD_ITEMS metadata for folder/persona matching
    const allMeta = DASHBOARD_ITEMS.flatMap(g => g.items.map(d => ({ ...d, folder: g.folder })));
    const results = [];
    Object.entries(DASHBOARDS).forEach(([dashId, dash]) => {
      if (dashId === "new-dashboard") return;
      const meta = allMeta.find(d => d.dashboardId === dashId);
      // context string: dashboard title + id + folder + personas
      const ctx = [
        dash.title,
        dashId.replace(/-/g, " "),
        meta?.folder || "",
        ...(meta?.personas || []),
        meta?.desc || "",
      ].join(" ").toLowerCase();
      (dash.widgets || []).forEach(w => {
        const hay = (w.title || "") + " " + ctx;
        const hayLower = hay.toLowerCase();
        const score = words.reduce((acc, word) => acc + (hayLower.includes(word) ? 1 : 0), 0);
        if (score > 0) results.push({ widget: w, score, sourceDashTitle: dash.title });
      });
    });
    return results.sort((a, b) => b.score - a.score).slice(0, 6);
  };

  /* Scripted "overall AI security" dashboard-creation workflow. Triggered
     from the blank New Dashboard when the prompt contains "overall AI
     security" (case-insensitive). Fully automated — the assistant narrates
     a series of timed steps, then loads the AI Risk Assessment dashboard
     into the blank canvas one widget at a time. The Thinking animation
     stays up (loading=true) for the entire run and stops only at the end. */
  const runAISecurityDashboardWorkflow = (text) => {
    const dashId = "new-dashboard";
    const widgets = DASHBOARDS["ai-risk-assessment"].widgets;
    const widgetLabel = (w, idx) => w.title || (idx === 0 ? "Risky AI Apps — Key Metrics" : "widget");
    const aiMsg = (t) => setMessages(m => [...m, { role: "ai", text: t }]);
    const EXEC_SUMMARY =
      "Executive summary\n\n" +
      "Your organization has 5 GenAI apps in active use, and 4 of them (80%) carry a Poor, Low, or Medium CCL rating — most AI usage falls outside the safe range, with ChatGPT the single riskiest app by activity.\n\n" +
      "• Exposure is concentrated: Medium-CCL apps drive 83.74% of all AI data volume, so a small set of apps accounts for the bulk of data exposure.\n" +
      "• Governance gaps dominate: 80% of AI apps (4 of 5) have no documented AI risk & compliance posture and no vendor security assessment. Every app already has a GenAI usage policy in place, so the priority is enforcement, not policy creation.\n" +
      "• DLP signal is regulated-data-driven: the 'Detect Credit card / GDPR info' policy generated all 286 DLP alerts this period, and automation identities — the 'appconnector_user' and 'assistant' accounts — are the top alert sources, not individual end users.\n\n" +
      "Recommended focus: tighten guardrails on ChatGPT and Google Gemini, close the risk-assessment and compliance-documentation gaps, and review automated/service-account access to sensitive data.";

    // Step 1 — start the run: record the prompt and turn on the Thinking animation.
    setMessages(m => [...m, { role: "user", text }]);
    setLoading(true);
    // Ensure the canvas starts blank for this run.
    setDashboardExtras(prev => ({ ...prev, [dashId]: [] }));

    // Steps 2–4 — narrated planning messages on a fixed cadence.
    setTimeout(() => aiMsg("I'll start by exploring existing templates and sample prompts to design the best dashboard to gauge your overall AI security. Let me gather information in parallel."), 2500);
    setTimeout(() => aiMsg("Great - there is a predefined AI Usage dashboard template. Let me start with this."), 6500);
    setTimeout(() => aiMsg("All queries are validated. No error detected, but the dashboard is a little redundant for evaluating overall AI security. Let me customize it based on this topic."), 11500);
    setTimeout(() => aiMsg("Now committing all widgets, starting with Application Events and Alerts."), 17500);

    // Step 5 — load the AI Risk Assessment widgets one at a time, narrating each.
    const WIDGET_START = 20700, WIDGET_GAP = 3200;
    widgets.forEach((w, idx) => {
      setTimeout(() => {
        aiMsg(`Adding data for ${widgetLabel(w, idx)}.`);
        setDashboardExtras(prev => ({ ...prev, [dashId]: [...(prev[dashId] || []), w] }));
      }, WIDGET_START + idx * WIDGET_GAP);
    });

    // Step 6/7 — retitle the canvas, deliver the executive summary plus a few
    // suggested follow-up questions, and stop Thinking.
    setTimeout(() => {
      setDashboardTitleOverrides(prev => ({ ...prev, [dashId]: "AI Risk Assessment" }));
      setMessages(m => [...m, {
        role: "ai",
        text: "I've created this AI Risk Assessment Dashboard to help you evaluate your overall AI security.\n\n" + EXEC_SUMMARY,
        examples: DASHBOARDS["ai-risk-assessment"].examplePrompts,
      }]);
      setLoading(false);
    }, WIDGET_START + widgets.length * WIDGET_GAP + 400);
  };

  const send = (text, knownResponseId) => {
    // "Overall AI security" scripted workflow — only on the blank New Dashboard.
    if (!knownResponseId && activeDashboard?.dashboardId === "new-dashboard" && /overall ai security/i.test(text)) {
      runAISecurityDashboardWorkflow(text);
      return;
    }
    // AI risk dashboard-creation wizard: once triggered, every subsequent
    // message is treated as "the answer" to the current step, bypassing
    // normal intent classification entirely.
    if (aiRiskWizardStep > 0) {
      setMessages(m => [...m, { role: "user", text }]);
      setLoading(true);
      setTimeout(() => {
        if (aiRiskWizardStep === 1) {
          setMessages(m => [...m, { role: "ai", text: `${AI_RISK_WIZARD.a1}\n\n${AI_RISK_WIZARD.q2}` }]);
          setLoading(false);
          setAiRiskWizardStep(2);
        } else if (aiRiskWizardStep === 2) {
          setMessages(m => [...m, { role: "ai", text: `${AI_RISK_WIZARD.a2}\n\n${AI_RISK_WIZARD.q3}` }]);
          setLoading(false);
          setAiRiskWizardStep(3);
        } else if (aiRiskWizardStep === 3) {
          setMessages(m => [...m, { role: "ai", text: AI_RISK_WIZARD.a3 }]);
          setLoading(false);
          setAiRiskWizardStep(0);
          setTimeout(() => {
            setLoading(true);
            setTimeout(() => {
              setMessages(m => [...m, { role: "ai", text: AI_RISK_WIZARD.done }]);
              setLoading(false);
              setTimeout(() => {
                setMessages(m => [...m, { role: "ai", dashboardPreview: { dashboardId: "ai-risk-assessment", title: "AI Risk Assessment", desc: "Risky AI app usage, CCL ratings, policies, DLP alerts, top users" } }]);
              }, 500);
            }, 800);
          }, 400);
        }
      }, 800);
      return;
    }
    if (!knownResponseId && showWelcome && /ai risk/i.test(text)) {
      setMessages(m => [...m, { role: "user", text }]);
      setLoading(true);
      setWelcomeChatMode(true);
      setTimeout(() => {
        setMessages(m => [...m, { role: "ai", text: AI_RISK_WIZARD.q1 }]);
        setLoading(false);
        setAiRiskWizardStep(1);
      }, 800);
      return;
    }
    // On the new blank dashboard: search existing widgets and surface matches
    if (activeDashboard?.dashboardId === "new-dashboard" && !knownResponseId) {
      const matches = matchWidgetsFromDashboards(text);
      const newMsgs = [{ role: "user", text }];
      if (matches.length > 0) {
        matches.forEach(({ widget, sourceDashTitle }) => {
          const response = widgetToResponse(widget, sourceDashTitle);
          if (response) newMsgs.push({ role: "ai", response });
        });
      } else {
        newMsgs.push({ role: "ai", response: { chartType: "freeform", title: "No matching widgets found", summary: "No existing widgets matched your query. Try keywords like 'DLP', 'users', 'severity', 'CISO', or 'GenAI'.", followUps: [] } });
      }
      setMessages(m => [...m, ...newMsgs]);
      return;
    }
    // On any other active dashboard: stay on the dashboard, add to chat
    if (activeDashboard) {
      setMessages(m => [...m, { role: "user", text }]);
      setLoading(true);
      setTimeout(() => {
        const id = knownResponseId || classifyPrompt(text);
        const response = RESPONSES[id] || RESPONSES.freeform;
        setMessages(m => [...m, { role: "ai", response }]);
        setLoading(false);
      }, 800);
      return;
    }
    // Welcome page: if the user entered multiple questions in one submission,
    // create exactly one widget per question (single questions fall through to
    // the normal keyword-routing / chat path below, which yields one widget).
    if (showWelcome && !knownResponseId) {
      const questions = splitQuestions(text);
      if (questions.length > 1) {
        setMessages(m => [...m, { role: "user", text }]);
        setLoading(true);
        setWelcomeChatMode(true);
        setTimeout(() => {
          const responses = questions.map(q => {
            const id = classifyPrompt(q);
            return { role: "ai", response: RESPONSES[id] || RESPONSES.freeform };
          });
          setMessages(m => [...m, ...responses]);
          setLoading(false);
        }, 800);
        return;
      }
    }
    // Welcome page / no active dashboard: keyword routing + normal chat
    if (!knownResponseId) {
      const dashMatch = matchDashboardByKeyword(text);
      if (dashMatch) {
        if (showWelcome) {
          setMessages(m => [...m, { role: "user", text }]);
          setLoading(true);
          setWelcomeChatMode(true);
          setTimeout(() => { setLoading(false); onPickDashboard(dashMatch); }, 800);
        } else {
          onPickDashboard(dashMatch);
        }
        return;
      }
    }
    if (showWelcome) {
      setMessages(m => [...m, { role: "user", text }]);
      setLoading(true);
      setWelcomeChatMode(true);
      setTimeout(() => {
        const id = knownResponseId || classifyPrompt(text);
        const response = RESPONSES[id] || RESPONSES.freeform;
        setMessages(m => [...m, { role: "ai", response }]);
        setLoading(false);
      }, 800);
      return;
    }
    setMessages(m => [...m, { role: "user", text }]);
    setLoading(true);
    setTimeout(() => {
      const id = knownResponseId || classifyPrompt(text);
      const response = RESPONSES[id] || RESPONSES.freeform;
      setMessages(m => [...m, { role: "ai", response }]);
      setLoading(false);
    }, 800);
  };

  const onQuickAction = (action) => send(action.title, action.responseId);
  const onFollowup = (text, id) => send(text, id);
  const onPickPrompt = (text) => send(text);
  const reset = () => guardLeave(() => { setMessages([]); setActiveDashboard(null); setShowWelcome(true); setShowDashboardGallery(false); setShowAgentGallery(false); setShowHistoryPage(false); setShowPersonalGallery(false); setShowGroupGallery(false); setShowSharedGallery(false); setIsAgentView(false); setNavHistory([]); setWelcomeChatMode(false); });

  /* Restore a previous session in place — replaces the current conversation
     with the saved messages so the user picks up where they left off. */
  const onPickHistory = (item) => guardLeave(() => {
    setActiveDashboard(null);
    const restored = item.messages.map(m =>
      m.role === "ai"
        ? { role: "ai", response: RESPONSES[m.responseId] || RESPONSES.freeform }
        : { role: "user", text: m.text }
    );
    setMessages(restored);
  });

  /* Open a predefined dashboard in dual-pane mode: dashboard pinned to the
     main canvas, and the chat is seeded with a plain-language summary plus
     a couple of example prompts so the user has an immediate starting point. */
  const onPickDashboard = (item) => guardLeave(() => {
    pushHistory();
    setShowWelcome(false);
    setActiveDashboard(item);
    const dash = DASHBOARDS[item.dashboardId];
    if (!dash) { setMessages([]); return; }
    setMessages([
      { role: "user", text: `Open the "${item.title}" dashboard` },
      { role: "ai", text: dash.summary || dash.description, examples: dash.examplePrompts || [] },
    ]);
  });

  const exitDashboard = () => guardLeave(() => setActiveDashboard(null));

  /* Open a pre-built agent: seed the conversation with the agent's flowchart
     so it appears as a single rich message, plus follow-up chips for viewing
     the report and editing the configuration. */
  const createAgent = (agent) => {
    setUserAgents(prev => prev.some(a => a.id === agent.id) ? prev : [...prev, agent]);
  };

  const onPickAgent = (agent) => guardLeave(() => {
    pushHistory();
    setShowWelcome(false);
    setShowAgentGallery(false);
    setShowDashboardGallery(false);
    setActiveDashboard(null);
    setIsAgentView(true);
    if (agent.isNew) {
      const blank = {
        id: "agent-new",
        category: "New",
        name: "",
        desc: "",
        isNew: true,
        lastRunDate: "—",
        nextRunDate: "—",
        duration: "—",
        status: "Draft",
        succeeded: 0,
        skipped: 0,
        config: {
          name:        "",
          triggerType: "manual",
          trigger:     "",
          scheduleFrequency: "weekly",
          scheduleDay:       "Monday",
          scheduleDayOfMonth:"1",
          scheduleTime:      "10:00 AM",
          schedule:    "Weekly · Monday · 10:00 AM",
          dataType:    "tenant",
          dataSource:  "naa-tenant",
          mcpServer:   "",
          data:        "Only fetch data from naa-tenant",
          summary:     "",
          analysis:    "",
          artifact:    "",
          destination: "",
        },
        nodes: [
          { id: "trigger",  title: "Manual trigger",   icon: "hand",     subtitle: "—", duration: "—", status: "ok",      color: "amber" },
          { id: "data",     title: "Data",             icon: "database", subtitle: "—", duration: "—", status: "ok",      color: "blue" },
          { id: "summary",  title: "Summary",          icon: "doc",      subtitle: "—", duration: "—", status: "ok",      color: "emerald", branch: "top" },
          { id: "analysis", title: "Analysis",         icon: "chart",    subtitle: "—", duration: "—", status: "ok",      color: "emerald", branch: "bottom" },
          { id: "artifact", title: "Artifact Builder", icon: "doc",      subtitle: "—", duration: "—", status: "ok",      color: "rose" },
          { id: "email",    title: "Email",            icon: "email",    subtitle: "—", duration: "—", status: "skipped", color: "fuchsia" },
        ],
        reportId: "agent-soc-behavior-report",
      };
      const response = {
        title: "New agent",
        chartType: "agent-flow",
        agent: blank,
        summary: "Configure a new agent below. Define a trigger, data source, AI reasoning instructions, artifact, and delivery destination — then save to add it to your agent library.",
        followUps: [],
      };
      setMessages([
        { role: "user", text: "Add a new agent" },
        { role: "ai",   response },
      ]);
      return;
    }
    const baseResponse = RESPONSES[agent.id] || {
      title: agent.name,
      chartType: "agent-flow",
      summary: `User-created agent. ${agent.config?.trigger || ""}`.trim(),
      followUps: [],
    };
    const response = { ...baseResponse, agent };
    setMessages([
      { role: "user", text: `Open the "${agent.name}" agent` },
      { role: "ai",   response },
    ]);
  });

  /* Add an in-chat chart to ANY dashboard. Works whether or not a dashboard
     is currently open in dual-pane mode — the user picks the target from the
     menu. */
  const addToDashboard = (response, dashboardId) => {
    const widget = responseToWidget(response);
    if (!widget) {
      toast(`Can't add — chart type "${response.chartType}" isn't a widget`, { kind: "error" });
      return;
    }
    /* Adding to a shared report changes it for everyone with access —
       confirm before committing. */
    if (SHARED_REPORT_ACCESS[dashboardId]) {
      const dashTitle = DASHBOARD_ITEMS.flatMap(g => g.items).find(d => d.dashboardId === dashboardId)?.title || "this report";
      setPendingSharedAdd({
        widgetTitle: response.title,
        reportTitle: dashTitle,
        access: SHARED_REPORT_ACCESS[dashboardId],
        onConfirm: () => addWidgetToDashboard(widget, response.title, dashboardId),
      });
      return;
    }
    addWidgetToDashboard(widget, response.title, dashboardId);
  };

  /* Append an already-converted widget directly to a dashboard. Used both
     by addToDashboard (after converting a response) and by the Widgets
     library (whose entries are already widgets). */
  const addWidgetToDashboard = (widget, title, dashboardId) => {
    ensureEditableCopy(dashboardId);
    setDashboardExtras(prev => ({
      ...prev,
      [dashboardId]: [...(prev[dashboardId] || []), widget],
    }));
    setWidgetOrderOverrides(prev => {
      if (!prev[dashboardId]) return prev;
      const dash = DASHBOARDS[dashboardId];
      const newIdx = dash.widgets.length + ((dashboardExtras[dashboardId] || []).length);
      return { ...prev, [dashboardId]: [...prev[dashboardId], newIdx] };
    });
    const dashTitle = DASHBOARD_ITEMS.flatMap(g => g.items).find(d => d.dashboardId === dashboardId)?.title || "dashboard";
    logEdit(dashboardId, `Added widget "${title}" from a prompt`);
    markDirty(dashboardId);
    toast(`Added "${title}" → ${dashTitle}`);
  };

  /* Save an in-chat chart to the personal Widgets library. The widget can
     later be added to any dashboard from the Widgets dropdown. */
  const saveWidget = (response) => {
    const widget = responseToWidget(response);
    if (!widget) {
      toast(`Can't save — chart type "${response.chartType}" isn't a widget`, { kind: "error" });
      return;
    }
    setSavedWidgets(prev => [
      { id: `w-${Date.now()}`, title: response.title, widget, savedAt: new Date(), personaRole: persona.role },
      ...prev,
    ]);
    toast(`Saved as widget — "${response.title}"`);
  };

  /* Save an in-chat chart into an existing report in My Reports. */
  const saveResponseToReport = (response, report) => {
    const widget = responseToWidget(response);
    if (!widget) {
      toast(`Can't save — chart type "${response.chartType}" isn't a widget`, { kind: "error" });
      return;
    }
    const commit = () => {
      setDashboardExtras(prev => ({
        ...prev,
        [report.dashboardId]: [...(prev[report.dashboardId] || []), widget],
      }));
      logEdit(report.dashboardId, `Added widget "${response.title}" from a prompt`);
      markDirty(report.dashboardId);
      toast(`Saved "${response.title}" → ${report.title}`);
    };
    if (SHARED_REPORT_ACCESS[report.dashboardId]) {
      setPendingSharedAdd({
        widgetTitle: response.title,
        reportTitle: report.title,
        access: SHARED_REPORT_ACCESS[report.dashboardId],
        onConfirm: commit,
      });
      return;
    }
    commit();
  };

  /* Create a brand-new report in My Reports seeded with this chart. */
  const createReportFromResponse = (response, name) => {
    const widget = responseToWidget(response);
    if (!widget) {
      toast(`Can't save — chart type "${response.chartType}" isn't a widget`, { kind: "error" });
      return;
    }
    const title = (name || "").trim() || response.title || "Untitled report";
    const newId = `my-report-${Date.now()}`;
    DASHBOARDS[newId] = {
      title,
      description: "Report created from the AI assistant.",
      summary: `${title} — created from the AI assistant. Ask a question to add more charts.`,
      examplePrompts: [],
      widgets: [],
    };
    const item = { dashboardId: newId, title, desc: "Created from the AI assistant", personas: [], folder: "Custom" };
    setMyDashboards(prev => [...prev, item]);
    setDashboardExtras(prev => ({
      ...prev,
      [newId]: [...(prev[newId] || []), widget],
    }));
    logEdit(newId, "Created report from the AI assistant");
    logEdit(newId, `Added widget "${response.title}" from a prompt`);
    toast(`Created report "${title}" in My Reports`);
    /* Land the user inside their new report (dual-pane) with the current
       conversation carried along, so they keep iterating by chat — each new
       chart can be saved here via Save to → "Currently open". */
    pushHistory();
    clearGalleries();
    setActiveDashboard(item);
    setMessages(m => [...m, {
      role: "ai",
      text: `I've created "${title}" and added "${response.title}" to it. Keep asking questions here — save any chart you like into this report from its ⋮ menu (Save to → ${title}), or ask me to refine what's already on the canvas.`,
    }]);
  };

  const removeSavedWidget = (id) => {
    setSavedWidgets(prev => prev.filter(w => w.id !== id));
    toast("Removed from Widgets library", { kind: "info" });
  };
  const renameSavedWidget = (id, newTitle) => {
    setSavedWidgets(prev => prev.map(w => w.id === id ? { ...w, title: newTitle } : w));
    toast("Widget renamed");
  };
  const renameDashboard = (dashboardId, newTitle) => {
    ensureEditableCopy(dashboardId);
    setDashboardTitleOverrides(prev => ({ ...prev, [dashboardId]: newTitle }));
    logEdit(dashboardId, `Renamed the report to "${newTitle}"`);
    markDirty(dashboardId);
    toast("Dashboard renamed");
  };
  const renameWidget = (dashboardId, widgetIndex, newTitle) => {
    ensureEditableCopy(dashboardId);
    setWidgetTitleOverrides(prev => ({
      ...prev,
      [dashboardId]: { ...(prev[dashboardId] || {}), [widgetIndex]: newTitle },
    }));
    logEdit(dashboardId, `Renamed a widget to "${newTitle}"`);
    markDirty(dashboardId);
    toast("Widget renamed");
  };
  const resizeWidget = (dashboardId, widgetIndex, newSize) => {
    ensureEditableCopy(dashboardId);
    setWidgetSizeOverrides(prev => ({
      ...prev,
      [dashboardId]: { ...(prev[dashboardId] || {}), [widgetIndex]: newSize },
    }));
    logEdit(dashboardId, "Resized a widget");
    markDirty(dashboardId);
  };
  const reorderWidget = (dashboardId, fromDisplayIdx, toDisplayIdx) => {
    if (fromDisplayIdx === toDisplayIdx || fromDisplayIdx == null || toDisplayIdx == null) return;
    const dash = DASHBOARDS[dashboardId];
    if (!dash) return;
    ensureEditableCopy(dashboardId);
    const total = dash.widgets.length + ((dashboardExtras[dashboardId] || []).length);
    setWidgetOrderOverrides(prev => {
      const current = prev[dashboardId] || Array.from({ length: total }, (_, i) => i);
      const next = [...current];
      const [moved] = next.splice(fromDisplayIdx, 1);
      next.splice(toDisplayIdx, 0, moved);
      return { ...prev, [dashboardId]: next };
    });
    logEdit(dashboardId, "Reordered widgets");
    markDirty(dashboardId);
  };

  /* Enter replace mode — the dashboard pane shows a banner and each
     widget gets a "Replace with this" overlay. Clicking a widget swaps
     the new visualization in place via performReplace. */
  const startReplaceMode = (response) => {
    if (!activeDashboard) return;
    const widget = responseToWidget(response);
    if (!widget) {
      toast(`Can't replace — chart type "${response.chartType}" isn't a widget`, { kind: "error" });
      return;
    }
    setReplaceTarget({ response, widget, dashboardId: activeDashboard.dashboardId });
  };
  const cancelReplaceMode = () => setReplaceTarget(null);
  const performReplace = (widgetIndex) => {
    if (!replaceTarget) return;
    const { widget, response, dashboardId } = replaceTarget;
    ensureEditableCopy(dashboardId);
    setDashboardReplacements(prev => ({
      ...prev,
      [dashboardId]: { ...(prev[dashboardId] || {}), [widgetIndex]: widget },
    }));
    setReplaceTarget(null);
    logEdit(dashboardId, `Replaced a widget with "${response.title}"`);
    markDirty(dashboardId);
    toast(`Replaced with "${response.title}"`);
  };
  useEffect(() => {
    if (!replaceTarget) return;
    const handler = (e) => { if (e.key === "Escape") cancelReplaceMode(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [replaceTarget]);

  /* Remove a previously-added widget from a dashboard. Only user-added
     widgets are removable; base widgets defined in DASHBOARDS are not. */
  const removeWidget = (dashboardId, extraIndex) => {
    logEdit(dashboardId, "Removed a widget");
    markDirty(dashboardId);
    setDashboardExtras(prev => ({
      ...prev,
      [dashboardId]: (prev[dashboardId] || []).filter((_, i) => i !== extraIndex),
    }));
    setWidgetOrderOverrides(prev => {
      if (!prev[dashboardId]) return prev;
      const dash = DASHBOARDS[dashboardId];
      const removedMergedIdx = dash.widgets.length + extraIndex;
      const next = prev[dashboardId]
        .filter(i => i !== removedMergedIdx)
        .map(i => i > removedMergedIdx ? i - 1 : i);
      return { ...prev, [dashboardId]: next };
    });
    toast("Widget removed from dashboard", { kind: "info" });
  };

  const isEmpty = messages.length === 0 && !loading;

  return (
    <div className={`app-shell${sidebarCollapsed ? " sidebar-collapsed" : ""}`}>
      {/* Confirm before changing a shared report — the edit is visible to
          everyone with access. */}
      {pendingSharedAdd && (
        <div className="fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 fade-in">
          <div className="bg-white rounded-2xl card-shadow w-full max-w-md p-6 menu-pop">
            <div className="flex items-start gap-3 mb-3">
              <div className="w-9 h-9 rounded-lg bg-slate-100 text-slate-500 grid place-items-center flex-shrink-0">{I.share}</div>
              <div>
                <div className="text-[14.5px] font-semibold text-slate-900">Add to a shared report?</div>
                <div className="text-[12.5px] text-slate-500 mt-0.5">"{pendingSharedAdd.reportTitle}" is shared with <span className="font-medium text-slate-700">{pendingSharedAdd.access}</span>.</div>
              </div>
            </div>
            <p className="text-[13px] text-slate-600 leading-relaxed mb-5">
              Adding "{pendingSharedAdd.widgetTitle}" will change this report for everyone with access, and the change will be recorded in the report's edit history.
            </p>
            <div className="flex items-center justify-end gap-2">
              <button onClick={() => setPendingSharedAdd(null)}
                className="text-[12.5px] text-slate-600 hover:text-slate-900 px-3 py-1.5 rounded-md hover:bg-slate-100 focus-ring">
                Cancel
              </button>
              <button onClick={() => { pendingSharedAdd.onConfirm(); setPendingSharedAdd(null); }}
                className="text-[12.5px] bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-md focus-ring">
                Add widget
              </button>
            </div>
          </div>
        </div>
      )}
      {/* Confirm before navigating away from a report with unsaved changes. */}
      {pendingLeaveAction && (
        <div className="fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 fade-in">
          <div className="bg-white rounded-2xl card-shadow w-full max-w-md p-6 menu-pop">
            <div className="flex items-start gap-3 mb-3">
              <div className="w-9 h-9 rounded-lg bg-slate-100 text-slate-500 grid place-items-center flex-shrink-0">{I.alert}</div>
              <div>
                <div className="text-[14.5px] font-semibold text-slate-900">Leave without saving?</div>
                <div className="text-[12.5px] text-slate-500 mt-0.5">"{activeDashboard?.title}" has unsaved changes.</div>
              </div>
            </div>
            <p className="text-[13px] text-slate-600 leading-relaxed mb-5">
              Are you sure you want to leave without saving? You can come back and click Save later — your edits aren't lost.
            </p>
            <div className="flex items-center justify-end gap-2">
              <button onClick={() => setPendingLeaveAction(null)}
                className="text-[12.5px] text-slate-600 hover:text-slate-900 px-3 py-1.5 rounded-md hover:bg-slate-100 focus-ring">
                Cancel
              </button>
              <button onClick={() => { const action = pendingLeaveAction; setPendingLeaveAction(null); action(); }}
                className="text-[12.5px] bg-rose-600 hover:bg-rose-700 text-white px-4 py-1.5 rounded-md focus-ring">
                Leave without saving
              </button>
            </div>
          </div>
        </div>
      )}
      <div className="app-chrome-header">
        <div className="app-chrome-header-left" />
      </div>
      <div className="app-chrome-sidebar">
        <div className="app-chrome-sidebar-top" />
        <div className="app-chrome-sidebar-bottom" />
      </div>
      <button onClick={() => setSidebarCollapsed(c => !c)}
        className="sidebar-collapse-toggle"
        title={sidebarCollapsed ? "Expand sidebar" : "Collapse sidebar"}
        aria-label={sidebarCollapsed ? "Expand sidebar" : "Collapse sidebar"}>
        {sidebarCollapsed ? (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
            <path d="m6 17 5-5-5-5" /><path d="m13 17 5-5-5-5" />
          </svg>
        ) : (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
            <path d="m11 17-5-5 5-5" /><path d="m18 17-5-5 5-5" />
          </svg>
        )}
      </button>
      <div className="content-region">
        <ContentControls onNewChat={reset} onPickPrompt={onPickPrompt}
                         onPickHistory={onPickHistory} onPickDashboard={onPickDashboard}
                         onPickAgent={onPickAgent} userAgents={userAgents}
                         onOpenDashboardGallery={() => { if (!showDashboardGallery) { pushHistory(); clearGalleries(); setShowDashboardGallery(true); } }}
                         onOpenAgentGallery={() => { pushHistory(); clearGalleries(); setShowAgentGallery(true); }}
                         onOpenHistoryPage={() => { pushHistory(); clearGalleries(); setShowHistoryPage(true); }}
                         onOpenPersonal={() => { pushHistory(); clearGalleries(); setShowPersonalGallery(true); }}
                         onOpenGroup={() => { pushHistory(); clearGalleries(); setShowGroupGallery(true); }}
                         onOpenShared={() => { pushHistory(); clearGalleries(); setShowSharedGallery(true); }}
                         onBack={goBack} canGoBack={navHistory.length > 0}
                         persona={persona} onChangePersona={onChangePersona}
                         savedWidgets={savedWidgets}
                         onAddWidgetToDashboard={addWidgetToDashboard}
                         onRemoveSavedWidget={removeSavedWidget}
                         onRenameSavedWidget={renameSavedWidget}
                         hidePersonaSwitcher={showWelcome || showDashboardGallery || showAgentGallery || !!activeDashboard || isAgentView}
                         hideRightExtras={showWelcome} />
        {showHistoryPage ? (
          <PromptHistoryPage
            onSend={(text) => { setShowHistoryPage(false); send(text); }}
            busy={loading}
            libraryItems={getLibraryFor(personaId)} />
        ) : showAgentGallery ? (
          <AgentGallery onClose={() => setShowAgentGallery(false)}
                        allAgents={[...AGENTS, ...userAgents]}
                        onPickAgent={(a) => { setShowAgentGallery(false); onPickAgent(a); }} />
        ) : showPersonalGallery ? (
          <SpaceGallery onPickDashboard={(d) => { setShowPersonalGallery(false); onPickDashboard(d); }}
                        favoriteDashboardIds={favoriteDashboardIds} onToggleFavorite={toggleFavoriteDashboard}
                        dashboards={myDashboards} />
        ) : showGroupGallery ? (
          <TabGallery title="Group" items={GROUP_DASHBOARDS}
            icon={<svg className="w-4 h-4 text-slate-500" viewBox="0 0 16 16" fill="none"><circle cx="5.5" cy="5" r="2.5" stroke="currentColor" strokeWidth="1.4"/><path d="M1 14c0-2.761 2.015-4.5 4.5-4.5S10 11.239 10 14" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/><circle cx="11.5" cy="5" r="2.5" stroke="currentColor" strokeWidth="1.4"/><path d="M10.5 9.6C11.1 9.55 11.3 9.5 11.5 9.5c2.485 0 4.5 1.739 4.5 4.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>}
            onPickDashboard={(d) => { setShowGroupGallery(false); onPickDashboard(d); }} />
        ) : showSharedGallery ? (
          <TabGallery title="Shared" items={SHARED_DASHBOARDS}
            icon={<svg className="w-4 h-4 text-slate-500" viewBox="0 0 16 16" fill="none"><circle cx="13" cy="3" r="2" stroke="currentColor" strokeWidth="1.4"/><circle cx="13" cy="13" r="2" stroke="currentColor" strokeWidth="1.4"/><circle cx="3" cy="8" r="2" stroke="currentColor" strokeWidth="1.4"/><path d="M5 8h3.5M11 3.8L8.5 7M11 12.2L8.5 9" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>}
            onPickDashboard={(d) => { setShowSharedGallery(false); onPickDashboard(d); }} />
        ) : showDashboardGallery ? (
          <DashboardGallery onClose={() => setShowDashboardGallery(false)}
                            onPickDashboard={(d) => { setShowDashboardGallery(false); onPickDashboard(d); }}
                            onNewDashboard={() => { setShowDashboardGallery(false); onPickDashboard({ dashboardId: "new-dashboard", title: "New Dashboard", desc: "" }); }}
                            favoriteDashboardIds={favoriteDashboardIds} onToggleFavorite={toggleFavoriteDashboard} />
        ) : showWelcome ? (
          <WelcomePage onSend={send} busy={loading} libraryItems={getLibraryFor(personaId)}
                       persona={persona} onChangePersona={onChangePersona} onSetPersonaOnly={id => setPersonaId(id)}
                       onPickDashboard={onPickDashboard}
                       chatMode={welcomeChatMode} messages={messages} onPickFollowup={onFollowup}
                       myReports={myDashboards} onSaveToReport={saveResponseToReport} onCreateReport={createReportFromResponse}
                       />
        ) : (
          <>
            {activeDashboard ? (
              <DualPane activeDashboard={activeDashboard} messages={messages} loading={loading}
                        onSend={send} onPickFollowup={onFollowup} onExit={exitDashboard}
                        onPickPrompt={onPickPrompt} scrollRef={scrollRef} personaId={personaId}
                        dashboardExtras={dashboardExtras[activeDashboard.dashboardId]}
                        dashboardReplacements={dashboardReplacements[activeDashboard.dashboardId]}
                        onAddToDashboard={addToDashboard}
                        activeDashboardId={activeDashboard.dashboardId}
                        activeDashboardTitle={activeDashboard.title}
                        onRemoveWidget={(idx) => removeWidget(activeDashboard.dashboardId, idx)}
                        onSaveWidget={saveWidget}
                        onStartReplace={startReplaceMode}
                        replaceTarget={replaceTarget}
                        onPerformReplace={performReplace}
                        onCancelReplace={cancelReplaceMode}
                        dashboardTitleOverride={dashboardTitleOverrides[activeDashboard.dashboardId]}
                        widgetTitleOverrides={widgetTitleOverrides[activeDashboard.dashboardId]}
                        widgetSizeOverrides={widgetSizeOverrides[activeDashboard.dashboardId]}
                        widgetOrder={widgetOrderOverrides[activeDashboard.dashboardId]}
                        onRenameDashboard={renameDashboard}
                        onRenameWidget={renameWidget}
                        onResizeWidget={resizeWidget}
                        onReorderWidget={reorderWidget}
                        libraryItems={getLibraryFor(personaId)}
                        onSaveChanges={() => saveDashboardChanges(activeDashboard.dashboardId)}
                        hasUnsavedChanges={!!dirtyDashboards[activeDashboard.dashboardId]}
                        isSavedToMyDashboards={isDashboardSaved(activeDashboard.dashboardId)}
                        editLog={editLogs[activeDashboard.dashboardId]}
                        myReports={myDashboards} onSaveToReport={saveResponseToReport} onCreateReport={createReportFromResponse} />
            ) : isAgentView ? (
              <AgentPane
                agentMessages={messages.slice(messages.findIndex(m => m.response?.chartType === "agent-flow"), messages.findIndex(m => m.response?.chartType === "agent-flow") + 1)}
                followUpMessages={messages.slice(messages.findIndex(m => m.response?.chartType === "agent-flow") + 1)}
                loading={loading} onSend={send} onPickFollowup={onFollowup}
                scrollRef={scrollRef} onAddToDashboard={addToDashboard}
                onSaveWidget={saveWidget} onCreateAgent={createAgent}
                onPickPrompt={onPickPrompt} libraryItems={getLibraryFor(personaId)}
                myReports={myDashboards} onSaveToReport={saveResponseToReport} onCreateReport={createReportFromResponse} />
            ) : (
              <>
                {isEmpty ? <Landing onPick={onQuickAction} persona={persona} onPickHistory={onPickHistory} /> :
                  <Conversation messages={messages} loading={loading} onPickFollowup={onFollowup}
                                scrollRef={scrollRef} onAddToDashboard={addToDashboard}
                                onSaveWidget={saveWidget} onCreateAgent={createAgent}
                                myReports={myDashboards} onSaveToReport={saveResponseToReport} onCreateReport={createReportFromResponse} />}
                <PromptInput onSend={send} busy={loading} onPickPrompt={onPickPrompt} libraryItems={getLibraryFor(personaId)} />
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ToastProvider><App /></ToastProvider>
);
    </script>
  </body>
</html>
