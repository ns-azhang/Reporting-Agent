         colors past the SVGs' natural bounds on larger screens. */
      .app-shell {

        overflow: hidden;
        background: var(--ink-50);

      /* Top bar: white strip across the full viewport width. The SVG is split
         into a left portion (logo + nav) anchored to the viewport's left edge

         stretches with white space so the bar stays responsive without
         distorting the SVG content. No bottom border. */
      .app-chrome-header {
        position: absolute; top: 0; left: 0; right: 0; height: 48px;
        background-color: #ffffff;
        border-bottom: 1px solid #E2E2E2;
        z-index: 1;
        user-select: none;

      /* The Top Bar SVG bakes in a 1px #E2E2E2 hairline at y=47–48. We clip

      .app-chrome-header-left {
        position: absolute; top: 0; left: 0; width: 220px; height: 48px;

        background-position: 0 0;

        background-repeat: no-repeat;

      .app-chrome-header-right {
        position: absolute; top: 0; right: 0; width: 220px; height: 48px;
        background-image: url("Top Bar.svg");
        background-position: 100% 0;

         layers — the main nav anchored to the top, and the bottom row
         (Settings, ~y=900–976 in the SVG) anchored to the viewport bottom
         so it stays visible regardless of viewport height. The top layer
         caps at 900px so it never overlaps the bottom Settings row. */

        border-right: 1px solid #E2E2E2;
        z-index: 1;

        background-position: 0 24px;

/* ---------------------------- EditableTitle ---------------------------- */
/* Click-to-edit text. Enter or blur saves; Esc cancels. Empty string is
   ignored (treated as cancel) so we never end up with blank titles. */
function EditableTitle({ value, onSave, children, className, inputClassName, penSize }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const inputRef = useRef(null);
  useEffect(() => {
    if (editing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); }
  }, [editing]);
  const start = (e) => { if (e) e.stopPropagation(); setDraft(value); setEditing(true); };
  const commit = () => {
    const v = draft.trim();
    if (v && v !== value && onSave) onSave(v);
    setEditing(false);
  };
  const cancel = () => { setDraft(value); setEditing(false); };
  if (editing) {
    return (
      <input ref={inputRef} value={draft}
        onChange={e => setDraft(e.target.value)}
        onBlur={commit}
        onClick={e => e.stopPropagation()}
        onKeyDown={e => {
          if (e.key === "Enter") { e.preventDefault(); commit(); }
          else if (e.key === "Escape") { e.preventDefault(); cancel(); }
        }}
        className={`${inputClassName || className || ""} bg-white border border-blue-400 rounded px-1.5 outline-none ring-2 ring-blue-100`} />
    );
  }
  return (
    <span className="inline-flex items-center gap-1.5 min-w-0">
      {children !== undefined ? children : <span className={className}>{value}</span>}
      <button onClick={start} title="Rename"
        className="text-slate-300 hover:text-slate-600 focus-ring rounded p-0.5 flex-shrink-0 transition-colors"
        style={{ width: penSize || 14, height: penSize || 14 }}>
        {I.edit}
      </button>
    </span>
  );
}

/* ---------------------------- Toast (notifications) ---------------------------- */
const ToastCtx = createContext(() => {});
const useToast = () => useContext(ToastCtx);

function ToastProvider({ children }) {
  const [items, setItems] = useState([]);
  const show = useCallback((message, opts = {}) => {
    const id = Math.random().toString(36).slice(2);
    setItems(t => [...t, { id, message, kind: opts.kind || "success", icon: opts.icon }]);
    setTimeout(() => setItems(t => t.filter(x => x.id !== id)), opts.duration || 2800);
  }, []);
  return (
    <ToastCtx.Provider value={show}>
      {children}
      <div className="fixed top-4 right-4 z-50 space-y-2 pointer-events-none">
        {items.map(t => {
          const tone = t.kind === "info"  ? "border-blue-200    bg-blue-50    text-blue-800"
                     : t.kind === "error" ? "border-rose-200    bg-rose-50    text-rose-800"
                     :                      "border-emerald-200 bg-emerald-50 text-emerald-800";
          const iconColor = t.kind === "info" ? "text-blue-600" : t.kind === "error" ? "text-rose-600" : "text-emerald-600";
          return (
            <div key={t.id} className={`toast-in pointer-events-auto card-shadow border ${tone} rounded-lg pl-3 pr-4 py-2.5 flex items-center gap-2.5 max-w-sm`}>
              <span className={iconColor}>{t.icon || I.check}</span>
              <span className="text-[13px] font-medium">{t.message}</span>
            </div>
          );
        })}
      </div>
    </ToastCtx.Provider>
  );
}

/* ---------------------------- Click-outside helper ---------------------------- */
function useClickOutside(ref, onOut) {
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) onOut(); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [ref, onOut]);
}

function WidgetPreviewBody({ widget }) {
  if (!widget) return null;
  if (widget.type === "kpi")   return <KPIRow kpis={widget.kpis} />;
  if (widget.type === "line")  return <LineChart series={widget.series} xLabels={widget.xLabels || []} anomalies={widget.anomalies || []} forecastIndex={widget.forecastIndex ?? null} />;
  if (widget.type === "hbar")  return <HBarChart data={widget.bars} />;
  if (widget.type === "donut") return <Donut data={widget.slices} size={140} />;
  if (widget.type === "table") return <DataTable columns={widget.columns} rows={widget.rows} />;
  return null;
}

function WidgetsLibrary({ savedWidgets, onAddWidgetToDashboard, onRemoveSavedWidget, onRenameSavedWidget }) {
  const [open, setOpen] = useState(false);
  const [view, setView] = useState("list");
  const [picked, setPicked] = useState(null);
  const ref = useRef(null);
  const reset = () => { setOpen(false); setView("list"); setPicked(null); };
  useClickOutside(ref, reset);

  const handlePick = (entry) => { setPicked(entry); setView("preview"); };
  const handleAddTo = (dashboardId) => {
    if (picked) onAddWidgetToDashboard(picked.widget, picked.title, dashboardId);
    reset();
  };
  const iconForType = (type) =>
    type === "donut" ? I.pie : type === "line" ? I.trend : type === "table" ? I.doc : I.chart;

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="inline-flex items-center gap-1.5 text-[12.5px] text-slate-600 hover:text-slate-900 hover:bg-slate-100 px-2 py-1 rounded focus-ring">
        <span className="text-slate-500">{I.save}</span>Widgets
        {savedWidgets.length > 0 && (
          <span className="text-[10px] font-semibold px-1.5 rounded-full bg-blue-50 text-blue-700 border border-blue-200 ml-0.5">
            {savedWidgets.length}
          </span>
        )}
      </button>
      {open && (
        <div className="menu-pop absolute right-0 mt-1 w-80 bg-white border border-slate-200 rounded-xl card-shadow z-30 overflow-hidden max-h-[28rem] overflow-y-auto">
          {view === "list" ? (
            <>
              <div className="px-3 py-2 border-b border-slate-200 flex items-center justify-between">
                <span className="text-[11px] uppercase tracking-wide text-slate-500 font-semibold">Saved widgets</span>
                {savedWidgets.length > 0 && <span className="text-[11px] text-slate-400 tabular-nums">{savedWidgets.length}</span>}
              </div>
              {savedWidgets.length === 0 ? (
                <div className="px-4 py-7 text-center">
                  <div className="w-9 h-9 rounded-full bg-slate-50 grid place-items-center mx-auto mb-2 text-slate-400">{I.save}</div>
                  <div className="text-[12.5px] text-slate-700 font-medium">No saved widgets yet</div>
                  <div className="text-[11.5px] text-slate-500 mt-1 leading-snug">
                    Use <span className="font-medium text-slate-700">Save as widget</span> in any chart's three-dot menu to stash it here.
                  </div>
                </div>
              ) : (
                <div className="py-1">
                  {savedWidgets.map(w => {
                    const dateStr = w.savedAt instanceof Date
                      ? w.savedAt.toLocaleDateString("en-US", { month: "short", day: "numeric" })
                      : "";
                    return (
                      <div key={w.id} className="group flex items-stretch hover:bg-slate-50">
                        <div className="flex-1 px-3 py-2 flex items-start gap-2.5 min-w-0 whitespace-normal break-words">
                          <button onClick={() => handlePick(w)} className="text-slate-400 mt-0.5 flex-shrink-0 focus-ring" title="Preview">{iconForType(w.widget.type)}</button>
                          <div className="flex-1 min-w-0">
                            <div className="text-[12.5px] text-slate-800 leading-snug">
                              {onRenameSavedWidget
                                ? <EditableTitle value={w.title} onSave={(t) => onRenameSavedWidget(w.id, t)} inputClassName="text-[12.5px] text-slate-800 w-full">
                                    <button onClick={() => handlePick(w)} className="text-left focus-ring hover:text-blue-700 truncate">{w.title}</button>
                                  </EditableTitle>
                                : <button onClick={() => handlePick(w)} className="text-left focus-ring">{w.title}</button>}
                            </div>
                            <div className="text-[11px] text-slate-500 mt-0.5">{dateStr}{dateStr && w.personaRole ? " · " : ""}{w.personaRole}</div>
                          </div>
                        </div>
                        <button onClick={() => onRemoveSavedWidget(w.id)} title="Delete from library"
                          className="opacity-0 group-hover:opacity-100 px-2 text-slate-400 hover:text-rose-600 focus-ring transition-opacity flex-shrink-0">
                          {I.trash}
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          ) : view === "preview" ? (
            <>
              <div className="px-3 py-2 border-b border-slate-200 flex items-center justify-between">
                <button onClick={() => { setView("list"); setPicked(null); }}
                  className="text-[11.5px] text-slate-500 hover:text-slate-700 focus-ring inline-flex items-center gap-1">‹ Back to library</button>
                <span className="text-[10px] uppercase tracking-wide text-slate-400 font-semibold">Preview</span>
              </div>
              <div className="px-4 pt-3">
                <div className="text-[13px] font-semibold text-slate-900 leading-snug">{picked?.title}</div>
                <div className="text-[11px] text-slate-500 mt-0.5">
                  {picked?.savedAt instanceof Date ? picked.savedAt.toLocaleDateString("en-US", { month: "short", day: "numeric" }) : ""}
                  {picked?.personaRole ? ` · ${picked.personaRole}` : ""}
                </div>
              </div>
              <div className="px-4 py-3">
                <div className="border border-slate-200 rounded-lg p-3 bg-slate-50/50">
                  <WidgetPreviewBody widget={picked?.widget} />
                </div>
              </div>
              <div className="px-4 pb-3 flex items-center gap-2">
                <button onClick={() => setView("addTo")}
                  className="inline-flex items-center justify-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-[12.5px] font-medium px-3 py-1.5 rounded-md focus-ring flex-1">
                  Add to dashboard ›
                </button>
                <button onClick={() => { setView("list"); setPicked(null); }}
                  className="text-[12.5px] text-slate-600 hover:text-slate-800 hover:bg-slate-100 px-2.5 py-1.5 rounded focus-ring">
                  Cancel
                </button>
              </div>
            </>
          ) : (
            <>
              <button onClick={() => setView("preview")}
                className="w-full text-left px-3 py-1.5 text-[11.5px] text-slate-500 hover:bg-slate-50 flex items-center gap-1 focus-ring">‹ Back to preview</button>
              <div className="h-px bg-slate-100 my-1" />
              <div className="px-3 py-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold">
                Add this widget to
              </div>
              {DASHBOARD_ITEMS.map(group => (
                <div key={group.folder} className="py-0.5">
                  <div className="px-3 pt-1 pb-0.5 text-[10px] uppercase tracking-wide text-slate-400 font-medium">{group.folder}</div>
                  {group.items.map(d => (
                    <button key={d.dashboardId} onClick={() => handleAddTo(d.dashboardId)}
                      className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-blue-50 hover:text-blue-700 flex items-center gap-2 focus-ring whitespace-normal break-words">
                      <span className="truncate flex-1">{d.title}</span>
                    </button>
                  ))}
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

function PromptLibraryMenu({ persona, onPickPrompt }) {
  const [open, setOpen] = React.useState(false);
  const [userPrompts, setUserPrompts] = React.useState([]);
  const [draft, setDraft] = React.useState("");
  const ref = React.useRef(null);
  useClickOutside(ref, () => setOpen(false));

  const addPrompt = () => {
    const text = draft.trim();
    if (!text) return;
    setUserPrompts(p => [...p, text]);
    setDraft("");
  };

  const nsGroups = getLibraryFor(persona.id);

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="inline-flex items-center gap-1.5 text-[12.5px] text-slate-600 hover:text-slate-900 hover:bg-slate-100 px-2 py-1 rounded focus-ring">

            <span className="text-[11px] uppercase tracking-wide text-slate-500 font-semibold">Netskope Prompts</span>
            <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-600 border border-indigo-100">NS</span>
          </div>
          <div className="py-1">
            {nsGroups.flatMap(group => group.items).map(p => (
              <button key={p} onClick={() => { setOpen(false); onPickPrompt(p); }}
                className="w-full text-left px-3 py-1.5 text-[13px] text-slate-700 hover:bg-blue-50 hover:text-blue-700 focus-ring flex items-center gap-2">
                <span className="text-slate-400 flex-shrink-0">{I.spark}</span>{p}
              </button>
            ))}
          </div>

          {/* My prompts */}
          <div className="px-3 py-2 border-t border-slate-200 flex items-center justify-between sticky top-0 bg-white z-10 mt-1">
            <span className="text-[11px] uppercase tracking-wide text-slate-500 font-semibold">My Prompts</span>
            {userPrompts.length > 0 && <span className="text-[11px] text-slate-400 tabular-nums">{userPrompts.length}</span>}
          </div>
          {userPrompts.length === 0 ? (
            <div className="px-4 py-3 text-[12px] text-slate-400 leading-snug">No saved prompts yet — type one below.</div>
          ) : (
            <div className="py-1">
              {userPrompts.map((p, i) => (
                <div key={i} className="group flex items-center hover:bg-slate-50">
                  <button onClick={() => { setOpen(false); onPickPrompt(p); }}
                    className="flex-1 text-left px-3 py-1.5 text-[13px] text-slate-700 hover:text-blue-700 focus-ring flex items-center gap-2 min-w-0">
                    <span className="text-slate-400 flex-shrink-0">{I.spark}</span>
                    <span className="truncate">{p}</span>
                  </button>
                  <button onClick={() => setUserPrompts(ps => ps.filter((_, idx) => idx !== i))} title="Remove"
                    className="opacity-0 group-hover:opacity-100 px-2 text-slate-400 hover:text-rose-600 focus-ring transition-opacity flex-shrink-0">
                    {I.x}
                  </button>
                </div>
              ))}
            </div>
          )}
          <div className="px-3 py-2.5 border-t border-slate-100 flex items-center gap-2">
            <input type="text" value={draft} onChange={e => setDraft(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); addPrompt(); } }}
              placeholder="Save a prompt…"
              className="flex-1 text-[12px] border border-slate-300 rounded-md px-2.5 py-1.5 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 focus:outline-none" />
            <button onClick={addPrompt} disabled={!draft.trim()}
              className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 text-white text-[12px] font-medium px-2.5 py-1.5 rounded-md focus-ring flex-shrink-0">
              Save
            </button>
          </div>

        </div>
      )}
    </div>
  );
}

const ONBOARDING_KEY = "naa:selectedJobs";
const ONBOARDING_DONE_KEY = "naa:onboardingDone";
function readSelectedJobs() {
  try {
    const raw = localStorage.getItem(ONBOARDING_KEY);
    if (!raw) return null;
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : null;
  } catch { return null; }
}
function writeSelectedJobs(jobs) {
  try {
    localStorage.setItem(ONBOARDING_KEY, JSON.stringify(jobs));
    localStorage.setItem(ONBOARDING_DONE_KEY, "1");

}
function readOnboardingDone() {

/* ?reset or ?demo on the URL wipes onboarding state so reviewers can replay

/* Related reports per job, most-relevant first. Each id is a report in

const REPORTS_BY_JOB = {
  investigate: ["dlp-overview", "severity-sla", "security-engineer", "dlp-policies"],
  report:      ["ai-risk-assessment", "ciso-overview", "severity-sla", "forecast", "security-engineer"],

  access:      ["security-analyst", "ciso-overview", "security-engineer", "severity-sla"],
};
/* Shown when the user skipped onboarding — the broadly popular set (6 cards
   so the grid stays a clean 2×3 with consistent card heights). */
const POPULAR_REPORTS = ["dlp-overview", "ai-risk-assessment", "ciso-overview", "genai-admin", "security-analyst", "insider-threat"];

/* Cap the visible set at 6 (REQ-UX-011), round-robining one report per
   selected job per round so every selection's most-relevant report is
   guaranteed a slot before any job's deeper picks. Dedupes across jobs. */
function resolveOnboardingCards(selectedJobs) {
  const picked = selectedJobs && selectedJobs.length > 0;
  const lists = picked ? selectedJobs.map(j => REPORTS_BY_JOB[j] || []) : [POPULAR_REPORTS];
  const ids = [];
  for (let round = 0; ids.length < 6 && lists.some(l => round < l.length); round++) {
    for (const list of lists) {
      if (ids.length >= 6) break;
      if (round < list.length && !ids.includes(list[round])) ids.push(list[round]);
    }
  }
  return ids
    .map(id => ALL_DASHBOARD_ITEMS.find(d => d.dashboardId === id))
    .filter(Boolean);
}

/* ============================== CHART PRIMITIVES ========================== */
const PALETTE = ["#2563eb","#0ea5e9","#14b8a6","#8b5cf6","#f59e0b","#ef4444","#64748b","#10b981"];
const fmt = n => n >= 1000 ? (n/1000).toFixed(n>=10000 ? 0 : 1) + "k" : String(n);

function HBarChart({ data, valueLabel = "Incidents", onDrill }) {
  const max = Math.max(...data.map(d => d.value));
  return (
    <div className="space-y-1">
      {data.map((d, i) => {
        const drillable = !!(d.drill && onDrill);
        return (
          <div key={d.label}
               role={drillable ? "button" : undefined}
               tabIndex={drillable ? 0 : undefined}
               onClick={drillable ? () => onDrill(d.drill.text, d.drill.id) : undefined}
               onKeyDown={drillable ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onDrill(d.drill.text, d.drill.id); } } : undefined}
               className={`grid grid-cols-[170px_1fr_56px] gap-3 items-center text-[12.5px] py-1 px-2 -mx-2 rounded ${drillable ? "cursor-pointer hover:bg-blue-50/60 focus-ring" : ""}`}
               title={drillable ? `Drill into ${d.label}` : d.label}>
            <div className={`truncate ${drillable ? "text-blue-700 font-medium" : "text-slate-700"}`}>{d.label}</div>
            <div className="h-6 bg-slate-100 rounded relative overflow-hidden">
              <div className="h-full rounded transition-all" style={{ width: `${(d.value/max)*100}%`, background: d.color || PALETTE[i % PALETTE.length] }} />
            </div>
            <div className="text-slate-900 font-medium tabular-nums text-right">{fmt(d.value)}</div>
          </div>
        );
      })}
      <div className="text-[11px] text-slate-400 pt-1 px-2">{valueLabel}</div>
    </div>
  );
}

function LineChart({ series, height = 220, xLabels = [], anomalies = [], forecastIndex = null, onDrill }) {
  const W = 720, H = height, P = { l: 38, r: 12, t: 14, b: 26 };
  const allValues = series.flatMap(s => s.values);
  const max = Math.max(...allValues) * 1.15;
  const min = 0;
  const n = series[0].values.length;
  const x = i => P.l + (i*(W - P.l - P.r))/(n-1);
  const y = v => P.t + (1 - (v - min)/(max-min)) * (H - P.t - P.b);
  const path = vals => vals.map((v,i) => `${i===0?"M":"L"} ${x(i)} ${y(v)}`).join(" ");
  const yticks = 4;

  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" role="img" aria-label="Trend chart">
        {[...Array(yticks+1)].map((_,i) => {
          const v = min + (max-min)*(i/yticks);
          const yy = y(v);
          return <g key={i}>
            <line x1={P.l} x2={W-P.r} y1={yy} y2={yy} stroke="#e2e8f0" strokeDasharray="2 4" />
            <text x={P.l-6} y={yy+3} textAnchor="end" fontSize="10" fill="#94a3b8">{fmt(Math.round(v))}</text>
          </g>;
        })}
        {forecastIndex !== null && (
          <rect x={x(forecastIndex)} y={P.t} width={W - P.r - x(forecastIndex)} height={H - P.t - P.b}
                fill="#2563eb" fillOpacity="0.04" />
        )}
        {series.map((s, idx) => (
          <g key={s.name}>

function Donut({ data, size = 180, onDrill }) {
  const total = data.reduce((s,d) => s + d.value, 0);
  const r = size/2 - 14, cx = size/2, cy = size/2;
  const [hover, setHover] = useState(null);
  let acc = 0;
  return (
    <div className="flex items-center gap-6 flex-wrap">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label="Donut chart">
        {data.map((d, i) => {
          const start = (acc/total)*Math.PI*2 - Math.PI/2;
          acc += d.value;
          const end = (acc/total)*Math.PI*2 - Math.PI/2;
          const large = end - start > Math.PI ? 1 : 0;
          const x1 = cx + r*Math.cos(start), y1 = cy + r*Math.sin(start);
          const x2 = cx + r*Math.cos(end),   y2 = cy + r*Math.sin(end);
          const drillable = !!(d.drill && onDrill);
          return <path key={d.label}
                       d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`}
                       fill={d.color || PALETTE[i % PALETTE.length]} stroke="white" strokeWidth="2"
                       opacity={hover != null && hover !== i ? 0.55 : 1}
                       style={drillable ? { cursor: "pointer", transition: "opacity 0.15s" } : { transition: "opacity 0.15s" }}
                       onMouseEnter={drillable ? () => setHover(i) : undefined}
                       onMouseLeave={drillable ? () => setHover(null) : undefined}
                       onClick={drillable ? () => onDrill(d.drill.text, d.drill.id) : undefined} />;
        })}
        <circle cx={cx} cy={cy} r={r*0.62} fill="white" />
        <text x={cx} y={cy-2} textAnchor="middle" fontSize="22" fontWeight="700" fill="#0f172a">{fmt(total)}</text>
        <text x={cx} y={cy+16} textAnchor="middle" fontSize="11" fill="#64748b">total</text>
      </svg>
      <div className="space-y-1 text-[12.5px] flex-1 min-w-[180px]">
        {data.map((d, i) => {
          const drillable = !!(d.drill && onDrill);
          return (
            <div key={d.label}
                 role={drillable ? "button" : undefined}
                 tabIndex={drillable ? 0 : undefined}
                 onClick={drillable ? () => onDrill(d.drill.text, d.drill.id) : undefined}
                 onMouseEnter={drillable ? () => setHover(i) : undefined}
                 onMouseLeave={drillable ? () => setHover(null) : undefined}
                 onKeyDown={drillable ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onDrill(d.drill.text, d.drill.id); } } : undefined}
                 className={`flex items-center justify-between gap-3 py-1 px-2 -mx-2 rounded ${drillable ? "cursor-pointer hover:bg-blue-50/60 focus-ring" : ""}`}
                 title={drillable ? `Drill into ${d.label}` : d.label}>
              <div className="flex items-center gap-2 min-w-0">
                <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: d.color || PALETTE[i % PALETTE.length] }} />
                <span className={`truncate ${drillable ? "text-blue-700 font-medium" : "text-slate-700"}`}>{d.label}</span>
              </div>
              <div className="flex items-baseline gap-2 flex-shrink-0">
                <span className="font-semibold text-slate-900 tabular-nums">{fmt(d.value)}</span>
                <span className="text-slate-400 text-[11px] tabular-nums">{((d.value/total)*100).toFixed(0)}%</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Gauge({ value = 0, color = "#ef4444", caption, size = 160 }) {
  const stroke = 14, r = (size - stroke) / 2, cx = size / 2, cy = size / 2;
  const circumference = 2 * Math.PI * r;
  const filled = Math.max(0, Math.min(100, value)) / 100 * circumference;
  return (
    <div className="flex flex-col items-center">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label="Gauge chart">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth={stroke} />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke}
                strokeDasharray={`${filled} ${circumference - filled}`} strokeLinecap="round"
                transform={`rotate(-90 ${cx} ${cy})`} />
        <text x={cx} y={cy + 9} textAnchor="middle" fontSize="28" fontWeight="700" fill="#0f172a">{value}%</text>
      </svg>
      {caption && <p className="text-[11px] text-slate-400 text-center mt-2 leading-snug px-2">{caption}</p>}
    </div>
  );
}

/* Simplified multi-column Sankey: nodes are stacked per column with height
   proportional to total flow, links are ribbons (two bezier edges) sized by
   value. Assumes flow is conserved column-to-column (each middle node's
   inflow total equals its outflow total) — callers should supply balanced
   link values. */
function Sankey({ columns, links, height = 340 }) {
  const nodeWidth = 12, nodePad = 10, width = Math.max(760, columns.length * 220);
  const colGap = (width - nodeWidth) / (columns.length - 1);
  const totalFlow = columns[0].reduce((s, n) => s + links.filter(l => l.source === n).reduce((a, l) => a + l.value, 0), 0);
  const maxNodesInCol = Math.max(...columns.map(c => c.length));
  const availableHeight = height - nodePad * (maxNodesInCol - 1);
  const scale = totalFlow > 0 ? availableHeight / totalFlow : 1;

  const nodeSize = {};
  columns.forEach(col => col.forEach(name => {
    const outSum = links.filter(l => l.source === name).reduce((s, l) => s + l.value, 0);
    const inSum  = links.filter(l => l.target === name).reduce((s, l) => s + l.value, 0);
    nodeSize[name] = Math.max(outSum, inSum);
  }));

  const nodePos = {};
  columns.forEach((col, ci) => {
    const colHeight = col.reduce((s, n) => s + nodeSize[n] * scale, 0) + nodePad * (col.length - 1);
    let cursor = (height - colHeight) / 2;
    col.forEach(name => {
      const h = Math.max(nodeSize[name] * scale, 2);
      nodePos[name] = { x: ci * colGap, y0: cursor, y1: cursor + h, col: ci };
      cursor += h + nodePad;
    });
  });

  const outCursor = {}, inCursor = {};
  columns.forEach(col => col.forEach(n => { outCursor[n] = nodePos[n].y0; inCursor[n] = nodePos[n].y0; }));

  const ribbons = links.map((l, i) => {
    const s = nodePos[l.source], t = nodePos[l.target];
    if (!s || !t) return null;
    const thickness = Math.max(l.value * scale, 1);
    const sy0 = outCursor[l.source]; const sy1 = sy0 + thickness; outCursor[l.source] = sy1;
    const ty0 = inCursor[l.target]; const ty1 = ty0 + thickness; inCursor[l.target] = ty1;
    const x0 = s.x + nodeWidth, x1 = t.x;
    const xm = (x0 + x1) / 2;
    const d = `M ${x0} ${sy0} C ${xm} ${sy0} ${xm} ${ty0} ${x1} ${ty0} L ${x1} ${ty1} C ${xm} ${ty1} ${xm} ${sy1} ${x0} ${sy1} Z`;
    return <path key={i} d={d} fill={l.color || "#94a3b8"} opacity="0.5" />;
  });

  const truncate = (s, n) => s.length > n ? s.slice(0, n - 1) + "…" : s;

  return (
    <div className="overflow-x-auto">
      <svg viewBox={`0 0 ${width} ${height}`} width="100%" style={{ minWidth: width }} role="img" aria-label="Sankey diagram">
        {ribbons}
        {columns.map((col, ci) => col.map(name => {
          const n = nodePos[name];
          const isLast = ci === columns.length - 1;
          return (
            <g key={name}>
              <rect x={n.x} y={n.y0} width={nodeWidth} height={n.y1 - n.y0} fill="#475569" rx="2" />
              <text x={isLast ? n.x - 6 : n.x + nodeWidth + 6} y={(n.y0 + n.y1) / 2} dy="0.32em"
                    textAnchor={isLast ? "end" : "start"} fontSize="10.5" fill="#334155">
                {truncate(name, 30)}
              </text>
            </g>
          );
        }))}
      </svg>
    </div>
  );
}

function GeoBubbleMapSvg({ points = [], height = 240 }) {
  const toXY = (lat, lon) => [ (lon + 180) / 360 * 1000, (90 - lat) / 180 * 500 ];
  const maxV = Math.max(...points.map(p => p.value), 1);
  const radius = (v) => 5 + Math.sqrt(v / maxV) * 34;
  return (
    <div className="w-full overflow-hidden rounded-lg border border-slate-100" style={{ background: "#f8fafc" }}>
      <svg viewBox="40 0 960 430" style={{ width: "100%", height }} role="img">
        {WORLD_CONTINENTS.map((pts, i) => (
          <polygon key={i} points={pts} fill="#e2e8f0" stroke="#ffffff" strokeWidth="1.5" strokeLinejoin="round" />
        ))}
        {[...points].sort((a, b) => b.value - a.value).map((p, i) => {
          const [cx, cy] = toXY(p.lat, p.lon);
          const r = radius(p.value);
          return (
            <g key={i}>
              <circle cx={cx} cy={cy} r={r} fill={p.color} fillOpacity="0.22" stroke={p.color} strokeWidth="1.5">
                <title>{`${p.label}: ${p.value.toLocaleString()}`}</title>
              </circle>
              <circle cx={cx} cy={cy} r="2.5" fill={p.color} />
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* Leaflet-based geo bubble map on Carto's light basemap (keyless, and
   visually close to the Google Maps style the real library reports use).
   Scroll-wheel zoom is off so the map never hijacks page scrolling. */
function GeoBubbleMap({ points = [], height = 260 }) {
  const mapRef = useRef(null);
  const hasLeaflet = typeof window !== "undefined" && !!window.L;
  useEffect(() => {
    if (!hasLeaflet || !mapRef.current) return;
    const map = L.map(mapRef.current, {
      center: [24, 5],
      zoom: 1,
      zoomSnap: 0.25,
      scrollWheelZoom: false,
      zoomControl: true,
      attributionControl: false,
      worldCopyJump: true,
    });
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      subdomains: "abcd",
      maxZoom: 12,
    }).addTo(map);
    const maxV = Math.max(...points.map(p => p.value), 1);
    const radius = (v) => 6 + Math.sqrt(v / maxV) * 34;
    [...points].sort((a, b) => b.value - a.value).forEach(p => {
      L.circleMarker([p.lat, p.lon], {
        radius: radius(p.value),
        color: p.color, weight: 1.5,
        fillColor: p.color, fillOpacity: 0.22,
      }).addTo(map).bindTooltip(`${p.label}: ${p.value.toLocaleString()}`);
      L.circleMarker([p.lat, p.lon], {
        radius: 2.5, color: p.color, weight: 0, fillColor: p.color, fillOpacity: 1,
      }).addTo(map);
    });
    return () => map.remove();
  }, [hasLeaflet, points]);
  if (!hasLeaflet) return <GeoBubbleMapSvg points={points} height={height} />;
  return (
    <div ref={mapRef} className="w-full overflow-hidden rounded-lg border border-slate-200"
         style={{ height, background: "#f8fafc" }} />
  );
}

        </div>
      )}
      {frequency === "monthly" && (
        <div>
          <AgentSubLabel>Day of month</AgentSubLabel>
          <select value={dayOfMonth || "1"} onChange={e => onChange("scheduleDayOfMonth", e.target.value)}
            className={AGENT_INPUT_CLASS + " bg-white"}>
            {Array.from({length: 28}, (_, i) => String(i + 1)).map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </div>
      )}
      {frequency === "daily" && <div className="hidden md:block" />}
      <div>
        <AgentSubLabel>Time</AgentSubLabel>
        <select value={time || "10:00 AM"} onChange={e => onChange("scheduleTime", e.target.value)}
          className={AGENT_INPUT_CLASS + " bg-white"}>
          {TIMES_OF_DAY.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
      </div>
    </div>
  );
}

function describeSchedule(cfg) {
  const time = cfg.scheduleTime || "10:00 AM";
  const freq = cfg.scheduleFrequency || "weekly";
  if (freq === "daily")   return `Daily · ${time}`;
  if (freq === "monthly") return `Monthly · day ${cfg.scheduleDayOfMonth || "1"} · ${time}`;
  return `Weekly · ${cfg.scheduleDay || "Monday"} · ${time}`;
}

function AgentConfigInline({ agent, onCancel, onSave, isNew }) {
  const [cfg, setCfg] = useState({ ...agent.config });
  const update = (key, value) => setCfg(prev => ({ ...prev, [key]: value }));

  const handleSave = () => {
    const finalCfg = { ...cfg };
    if (cfg.triggerType === "schedule") finalCfg.schedule = describeSchedule(cfg);
    onSave(finalCfg);
  };

  return (
    <div className="border border-slate-200 rounded-lg bg-white fade-in">
      <div className="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
        <div>
          <div className="text-[13px] font-semibold text-slate-900">{isNew ? "Create a new agent" : "Edit agent configuration"}</div>
          <div className="text-[11px] text-slate-500 mt-0.5">{isNew ? "Configure five steps to build your automation" : "Five steps · changes apply on the next run"}</div>
        </div>
        {!isNew && (
          <button onClick={onCancel} className="text-[11.5px] text-slate-500 hover:text-slate-800 focus-ring rounded px-2 py-1">‹ Back to flow</button>
        )}
      </div>

      <div className="p-4 space-y-3">
        {isNew && (
          <AgentSection title="Agent name">
            <input type="text" value={cfg.name || ""} onChange={e => update("name", e.target.value)}

        <AgentSection title="Trigger Condition">
          <div>
            <AgentSubLabel>Trigger criteria</AgentSubLabel>
            <textarea value={cfg.trigger} onChange={e => update("trigger", e.target.value)}
              rows={2} placeholder="When should this agent run?" className={AGENT_INPUT_CLASS} />

        </AgentSection>

        <AgentSection title="Data Source">
          <div>

            <select value={cfg.dataSource || "naa-tenant"} onChange={e => { update("dataSource", e.target.value); update("data", `Only fetch data from ${e.target.value}`); }}
              className={AGENT_INPUT_CLASS + " bg-white"}>
              {TENANT_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
            <div className="text-[10.5px] text-slate-400 mt-1">Tenants you have access to</div>
          </div>
        </AgentSection>

        <AgentSection title="Analysis & Summary">

            <textarea value={cfg.analysis} onChange={e => update("analysis", e.target.value)}

          </div>
          <div>
            <AgentSubLabel>Summary instructions</AgentSubLabel>
            <textarea value={cfg.summary} onChange={e => update("summary", e.target.value)}
              rows={3} placeholder="How should results be rolled up for reporting?" className={AGENT_INPUT_CLASS} />
          </div>
        </AgentSection>

        <AgentSection title="Create Artifact">
          <div>
            <AgentSubLabel>Report Format</AgentSubLabel>
            <select value={cfg.reportFormat || "PDF"} onChange={e => update("reportFormat", e.target.value)}
              className={AGENT_INPUT_CLASS + " bg-white"}>
              {["PDF", "PNG", "CSV", "XLSX", "HTML", "JSON"].map(f => <option key={f} value={f}>{f}</option>)}
            </select>
          </div>
        </AgentSection>

        <AgentSection title="Delivery Method">
          <div>
            <AgentSubLabel>Recipient</AgentSubLabel>
            <input type="text" value={cfg.destination} onChange={e => update("destination", e.target.value)}

      <div className="px-4 py-3 border-t border-slate-200 flex items-center justify-end gap-2 bg-slate-50/40 rounded-b-lg">

          className="text-[12.5px] text-slate-700 hover:bg-slate-100 px-3 py-1.5 rounded-md focus-ring">Cancel</button>
        <button onClick={handleSave}
          className="text-[12.5px] bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-md focus-ring">{isNew ? "Create agent" : "Save changes"}</button>
      </div>

function AgentFlow({ agent: initialAgent, onPickFollowup, toast, onCreateAgent }) {
  const [agent, setAgent] = useState(initialAgent);
  const [selected, setSelected] = useState(null);
  const [editing, setEditing] = useState(!!initialAgent.isNew);

  const buildNodesFromConfig = (cfg, prevNodes) => prevNodes.map(n => {
    const subtitleByKey = {
      trigger:  cfg.triggerType === "schedule" ? `Run on schedule: ${cfg.schedule || "—"}` : (cfg.trigger || "—"),
      data:     cfg.dataType === "mcp" ? `MCP: ${cfg.mcpServer || "—"}` : `Only fetch data from ${cfg.dataSource || "—"}`,
      summary:  cfg.summary  || "—",
      analysis: cfg.analysis || "—",
      artifact: cfg.artifact || "—",
      email:    `To: ${cfg.destination || "—"}`,
    };
    return { ...n, subtitle: subtitleByKey[n.id] || n.subtitle };
  });

  const handleSave = (cfg) => {
    const wasNew = agent.isNew;
    const nextAgent = {
      ...agent,
      id:     wasNew ? `agent-user-${Date.now()}` : agent.id,
      isNew:  false,
      name:   wasNew ? (cfg.name || "Untitled agent") : agent.name,
      desc:   wasNew ? (cfg.trigger || "Custom agent").slice(0, 60) : agent.desc,
      lastRunDate: wasNew ? "—" : agent.lastRunDate,
      nextRunDate: cfg.triggerType === "schedule" ? (cfg.schedule || agent.nextRunDate) : agent.nextRunDate,
      category: wasNew ? "My agents" : agent.category,
      config: cfg,
      nodes:  buildNodesFromConfig(cfg, agent.nodes),
      reportId: agent.reportId || "agent-soc-behavior-report",
    };
    setAgent(nextAgent);
    setEditing(false);
    if (wasNew && onCreateAgent) onCreateAgent(nextAgent);
    if (toast) toast(wasNew ? `Agent "${nextAgent.name}" created` : "Agent configuration saved", { kind: "success" });
  };

  const handleCancel = () => {
    if (initialAgent.isNew) {
      if (toast) toast("Agent creation cancelled", { kind: "info" });
    }
    setEditing(false);
  };

  if (editing) {
    return (
      <AgentConfigInline
        agent={agent}
        isNew={initialAgent.isNew && agent.isNew}
        onCancel={handleCancel}
        onSave={handleSave}
      />
    );
  }

  if (agent.isNew) {
    return (
      <div className="border border-dashed border-slate-300 rounded-lg p-6 text-center bg-slate-50/40">
        <div className="text-[13px] text-slate-600">Agent creation cancelled.</div>
        <button onClick={() => { setEditing(true); }}
          className="mt-3 inline-flex items-center gap-1.5 text-[12.5px] bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-md focus-ring">
          {I.plus} Start over
        </button>
      </div>
    );
  }
  const trigger  = agent.nodes.find(n => n.id === "trigger");
  const data     = agent.nodes.find(n => n.id === "data");
  const summary  = agent.nodes.find(n => n.id === "summary");
  const analysis = agent.nodes.find(n => n.id === "analysis");
  const artifact = agent.nodes.find(n => n.id === "artifact");
  const email    = agent.nodes.find(n => n.id === "email");

  const sel = selected ? agent.nodes.find(n => n.id === selected) : null;

  return (
    <div className="space-y-4">
      {/* Flowchart */}
      <div className="border border-slate-200 rounded-lg p-5 bg-slate-50/40 overflow-x-auto">
        <div className="flex items-center gap-2 min-w-max">
          <AgentNode node={trigger}  onClick={() => setSelected("trigger")} />
          <AgentArrow />
          <AgentNode node={data}     onClick={() => setSelected("data")} />
          <AgentArrow />
          {/* Parallel column */}
          <div className="flex flex-col gap-3">
            <AgentNode node={summary}  onClick={() => setSelected("summary")} />
            <AgentNode node={analysis} onClick={() => setSelected("analysis")} />
          </div>
          <AgentArrow />
          <AgentNode node={artifact} onClick={() => setSelected("artifact")} />
          <AgentArrow />
          <AgentNode node={email}    onClick={() => setSelected("email")}    dim />
        </div>
      </div>

      {/* Selected step config (drawer-style inline panel) */}
      {sel && (
        <div className="border border-blue-200 bg-blue-50/40 rounded-lg p-4 fade-in">
          <div className="flex items-start justify-between gap-3 mb-2">
            <div className="flex items-center gap-2">
              <div className={`w-6 h-6 rounded ${(AGENT_NODE_COLORS[sel.color]||AGENT_NODE_COLORS.blue).ic} grid place-items-center`}>{I[sel.icon] || I.spark}</div>
              <div className="text-[13px] font-semibold text-slate-900">{sel.title}</div>
            </div>
            <button onClick={() => setSelected(null)} className="text-slate-400 hover:text-slate-700 text-[12px] focus-ring rounded p-0.5">{I.x}</button>
          </div>
          <div className="text-[12.5px] text-slate-700 leading-relaxed">{sel.subtitle}</div>
          <div className="text-[11px] text-slate-500 mt-2">Step duration: {sel.duration} · Status: {sel.status === "skipped" ? "Skipped (preview mode)" : "Succeeded"}</div>
        </div>
      )}

      {/* Primary actions */}
      <div className="flex flex-wrap gap-2">
        <button onClick={() => onPickFollowup("View the latest weekly report", agent.reportId)}
          className="inline-flex items-center gap-1.5 text-[12.5px] bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-md focus-ring">
          {I.doc} View latest report
        </button>
        <button onClick={() => setEditing(true)}
          className="inline-flex items-center gap-1.5 text-[12.5px] bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-3 py-1.5 rounded-md focus-ring">
          {I.edit} Edit configuration
        </button>
      </div>

    </div>
  );
}

  if (action.kind === "export") {
    return (
      <div className="border border-slate-200 rounded-lg p-4 bg-gradient-to-br from-emerald-50/50 to-white">
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded-lg bg-emerald-100 text-emerald-700 grid place-items-center flex-shrink-0">{I.doc}</div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              <code className="text-[13px] font-mono font-semibold text-slate-900 truncate">{action.filename}</code>
              <span className="inline-flex items-center gap-1 text-[10.5px] font-medium px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 border border-emerald-200">{I.check} Ready</span>
            </div>
            <div className="text-[12px] text-slate-500 mt-1 tabular-nums">{fmt(action.rows)} rows · {action.columns.length} columns · {action.sizeKb} KB</div>
            <details className="mt-2">
              <summary className="text-[11.5px] text-slate-500 hover:text-slate-700 cursor-pointer select-none inline-flex items-center gap-1">
                <span className="inline-block w-3">›</span> Preview columns
              </summary>
              <div className="mt-2 flex flex-wrap gap-1">
                {action.columns.map(c => (
                  <span key={c} className="text-[10.5px] font-mono px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 border border-slate-200">{c}</span>

              </div>
            </details>
          </div>
        </div>
        <div className="flex flex-wrap items-center gap-2 mt-4 pt-4 border-t border-slate-200">
          <button onClick={() => { setDone(true); toast(`${action.filename} downloaded`); }} disabled={done}
            className="inline-flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 disabled:bg-emerald-100 disabled:text-emerald-700 disabled:cursor-default text-white text-[13px] font-medium px-3 py-1.5 rounded-lg transition-colors focus-ring">
            {done ? <>{I.check} Downloaded</> : <>{I.download} Download CSV</>}
          </button>
          <button onClick={() => { setDonePdf(true); toast(`${action.filename.replace(/\.csv$/i, ".pdf")} downloaded`); }} disabled={donePdf}
            className="inline-flex items-center gap-1.5 bg-white border border-slate-300 hover:border-blue-400 hover:text-blue-700 disabled:bg-emerald-100 disabled:text-emerald-700 disabled:border-emerald-200 disabled:cursor-default text-slate-700 text-[13px] font-medium px-3 py-1.5 rounded-lg transition-colors focus-ring">

            {I.copy} Copy share link

          <button onClick={() => toast("Opened scheduler", { kind: "info" })}
            className="inline-flex items-center gap-1.5 bg-white border border-slate-300 hover:border-slate-400 text-slate-700 text-[13px] font-medium px-3 py-1.5 rounded-lg focus-ring">
            {I.history} Schedule recurring
          </button>
        </div>
      </div>
    );
  }

  if (action.kind === "schedule") {
    return (
      <div className="border border-slate-200 rounded-lg p-4 bg-gradient-to-br from-blue-50/40 to-white">
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded-lg bg-blue-100 text-blue-700 grid place-items-center flex-shrink-0">{I.calendar}</div>
          <div className="flex-1 min-w-0">
            <div className="text-[14px] font-semibold text-slate-900">{action.title}</div>
            <dl className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1.5 mt-2.5 text-[12.5px]">
              {action.fields.map(f => (
                <div key={f.label} className="flex justify-between gap-3">
                  <dt className="text-slate-500">{f.label}</dt>
                  <dd className="text-slate-900 font-medium text-right truncate">{f.value}</dd>
                </div>
              ))}
            </dl>
          </div>
        </div>
        <div className="flex items-center gap-2 mt-4 pt-4 border-t border-slate-200">
          <button onClick={() => { setDone(true); toast(`Scheduled — first run ${action.firstRun}`); }} disabled={done}
            className="inline-flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 disabled:bg-emerald-100 disabled:text-emerald-700 text-white text-[13px] font-medium px-3 py-1.5 rounded-lg focus-ring">
            {done ? <>{I.check} Schedule confirmed</> : <>Confirm schedule</>}

        </div>

    );
  }

  if (action.kind === "send") {
    return (
      <div className="border border-slate-200 rounded-lg p-4 bg-gradient-to-br from-violet-50/40 to-white">
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded-lg bg-violet-100 text-violet-700 grid place-items-center flex-shrink-0">{I.share}</div>
          <div className="flex-1 min-w-0">
            <div className="text-[14px] font-semibold text-slate-900">{action.title}</div>
            <div className="text-[12.5px] text-slate-500 mt-0.5">Channel: <span className="font-mono text-slate-700">{action.channel}</span></div>

  if (action.kind === "recommendation") {
    return (
      <div className="border border-slate-200 rounded-lg p-4 bg-gradient-to-br from-amber-50/50 to-white">
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded-lg bg-amber-100 text-amber-700 grid place-items-center flex-shrink-0">{I.alert}</div>
          <div className="flex-1 min-w-0">
            <div className="text-[14px] font-semibold text-slate-900">{action.title}</div>
            <div className="text-[12.5px] text-slate-500 mt-0.5">Generated from policy + destination + user-risk signals</div>
          </div>
        </div>
        <ul className="mt-3 space-y-2">
          {action.recommendations.map((r, i) => (
            <li key={i} className="border border-slate-200 rounded-lg p-3 bg-white flex items-start gap-3">
              <span className="text-[10.5px] font-semibold px-1.5 py-0.5 rounded text-amber-700 bg-amber-50 border border-amber-200 mt-0.5">REC {i+1}</span>
              <div className="flex-1">
                <div className="text-[13px] font-medium text-slate-900">{r.title}</div>
                <div className="text-[12px] text-slate-500 mt-0.5">{r.detail}</div>
              </div>
              <button onClick={() => toast(`Drafted: ${r.title}`, { kind: "info" })}
                className="text-[12px] px-2.5 py-1 rounded border border-slate-300 hover:border-slate-400 text-slate-700 focus-ring flex-shrink-0">Draft policy</button>
            </li>
          ))}
        </ul>
      </div>
    );
  }

  return null;
}

  const opts = [];
  if (response.kpis && response.series) opts.push({ value: "kpi+line", label: "KPI + line" });
  if (response.kpis && !response.series) opts.push({ value: "kpi", label: "KPI row" });
  if (response.bars || response.series)  opts.push({ value: "hbar",     label: "Bar" });
  if (response.bars || response.slices)  opts.push({ value: "donut",    label: "Donut" });
  if (response.action)                   opts.push({ value: "action",   label: "Action" });
  if (response.table)                    opts.push({ value: "table",    label: "Table" });
  if (response.ackKind)                  opts.push({ value: "ack",      label: "Acknowledgment" });
  return opts;
}

function getBarsFor(response) {
  if (response.bars) return response.bars;
  if (response.slices) return response.slices;
  if (response.series) {
    const s = response.series[0];
    return s.values.map((v, i) => ({
      label: response.xLabels[i] || `${i+1}`,
      value: v,
      color: s.color,
    }));
  }
  return [];
}

function getSlicesFor(response) {
  if (response.slices) return response.slices;
  if (response.bars)   return response.bars.slice(0, 6).map((b, i) => ({ ...b, color: b.color || PALETTE[i % PALETTE.length] }));
  return [];
}

/* ---------------------------- Feedback panel ---------------------------- */
const FEEDBACK_REASONS = ["Incorrect data", "Missing context", "Doesn't answer my question", "Hard to read"];

function FeedbackForm({ onSubmit, onCancel }) {
  const [reasons, setReasons] = useState([]);
  const [text, setText] = useState("");
  const toggle = r => setReasons(rs => rs.includes(r) ? rs.filter(x => x !== r) : [...rs, r]);
  return (
    <div className="border-t border-slate-200 bg-rose-50/40 px-5 py-4 fade-in">
      <div className="text-[12.5px] font-medium text-slate-800 mb-2">What was wrong with this response?</div>
      <div className="grid grid-cols-2 gap-1.5 mb-3">
        {FEEDBACK_REASONS.map(r => (
          <label key={r} className="inline-flex items-center gap-2 text-[12.5px] text-slate-700 cursor-pointer p-1.5 rounded hover:bg-white">
            <input type="checkbox" checked={reasons.includes(r)} onChange={() => toggle(r)}
              className="rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
            {r}
          </label>
        ))}
      </div>
      <textarea value={text} onChange={e => setText(e.target.value)} rows={2}
        placeholder="Optional: add details that would help us improve this response."
        className="w-full text-[12.5px] border border-slate-300 rounded-lg px-3 py-2 bg-white focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100 resize-none" />
      <div className="flex items-center gap-2 mt-2.5">
        <button onClick={() => onSubmit({ reasons, text })}
          className="bg-rose-600 hover:bg-rose-700 text-white text-[12.5px] font-medium px-3 py-1.5 rounded-lg focus-ring">
          Submit feedback
        </button>
        <button onClick={onCancel}
          className="text-[12.5px] text-slate-600 hover:text-slate-800 px-3 py-1.5 rounded-lg hover:bg-slate-100 focus-ring">
          Cancel
        </button>
      </div>
    </div>
  );
}

/* ---------------------------- Response renderer ---------------------------- */
function ResponseCard({ response, onPickFollowup, onAddToDashboard, activeDashboardId, activeDashboardTitle, onStartReplace, onSaveWidget, onCreateAgent, hideInsight = false, singleChart = false, saveToMode = false, myReports = [], onSaveToReport, onCreateReport }) {
  const toast = useToast();
  const options = useMemo(() => getChartOptions(response), [response]);
  const [chartType, setChartType] = useState(response.chartType);
  const [feedback, setFeedback] = useState(null);
  const [feedbackDone, setFeedbackDone] = useState(false);
  const [moreOpen, setMoreOpen] = useState(false);
  const [menuView, setMenuView] = useState("main");
  const [newReportName, setNewReportName] = useState("");
  const [saveToSearch, setSaveToSearch] = useState("");
  const moreRef = useRef(null);
  const closeMenu = () => { setMoreOpen(false); setMenuView("main"); setNewReportName(""); setSaveToSearch(""); };
  useClickOutside(moreRef, closeMenu);
  const widgetReady = !!responseToWidget(response);

  const isAgent  = response.chartType === "agent-flow" || response.chartType === "agent-report";
  const isAction = response.chartType === "action" || response.chartType === "ack" || isAgent;
  const showSelector = options.length > 1 && !isAction;

  const renderChart = () => {
    if (chartType === "kpi+line") {
      // Welcome-chat widgets show exactly one chart: drop the KPI scorecard
      // row and render only the line chart (or the KPIs if there is no series).
      if (singleChart) {
        const pd = response.periodPicker
          ? ((response.periodData && response.periodData[response.periodPicker.default]) || response)
          : response;
        if (pd.series) {
          return <LineChart series={pd.series} xLabels={pd.xLabels} anomalies={pd.anomalies || []}
                            forecastIndex={response.forecastIndex ?? null} onDrill={onPickFollowup} />;
        }
        return response.kpis ? <KPIRow kpis={response.kpis} /> : null;
      }
      if (response.periodPicker) {
        return <KPILineWithPeriod response={response} onPickFollowup={onPickFollowup} />;
      }
      return (
        <div className="space-y-5">
          {response.kpis && <KPIRow kpis={response.kpis} />}
          <LineChart series={response.series} xLabels={response.xLabels} anomalies={response.anomalies}
                     forecastIndex={response.forecastIndex ?? null} onDrill={onPickFollowup} />
        </div>
      );
    }
    if (chartType === "kpi")      return <KPIRow kpis={response.kpis} />;
    if (chartType === "hbar")   return <HBarChart data={getBarsFor(response)} onDrill={onPickFollowup} />;
    if (chartType === "donut")  return <Donut    data={getSlicesFor(response)} onDrill={onPickFollowup} />;
    if (chartType === "action") return <ActionPanel action={response.action} toast={toast} />;
    if (chartType === "table")  return <DataTable columns={response.table.columns} rows={response.table.rows} />;
    if (chartType === "agent-flow"  ) {
      const flowAgent = response.agent || AGENTS.find(a => a.id === response.agentId) || AGENTS[0];
      return <AgentFlow key={flowAgent.id + ":" + (flowAgent.isNew ? "new" : "open")} agent={flowAgent} onPickFollowup={onPickFollowup} toast={toast} onCreateAgent={onCreateAgent} />;
    }
    if (chartType === "agent-report") return <AgentReport report={response.report} onPickFollowup={onPickFollowup} />;
    if (chartType === "ack")    return (
      <div className="border border-emerald-200 bg-emerald-50 text-emerald-800 rounded-lg p-3 inline-flex items-center gap-2 text-[13px] font-medium">
        {response.ackKind === "cancelled" ? I.x : I.check}
        {response.ackKind === "cancelled" ? "Cancelled — no changes applied." : "Acknowledged — recorded in your tenant."}
      </div>
    );
    return null;
  };

  const handleCopy = () => {
    try { navigator.clipboard?.writeText(response.summary); } catch {}
    toast("Insight copied to clipboard");
  };
  const handleAddTo = (dashboardId) => {
    if (onAddToDashboard) onAddToDashboard(response, dashboardId);
    closeMenu();
  };
  const handleExport = () => onPickFollowup("Export this as a CSV", "action-export");
  const handleShare = () => toast("Conversation share link copied");
  const handleDelete = () => toast("Card removed from this conversation", { kind: "info" });

  return (
    <div className="bg-white border border-slate-200 rounded-xl card-shadow overflow-hidden fade-in">
      {/* Header */}
      <div className={`px-5 ${isAgent ? "py-2.5" : "py-3.5"} border-b border-slate-200 flex items-center justify-between gap-3`}>
        <div className="flex items-center gap-2.5 min-w-0">
          <div className="w-7 h-7 rounded bg-blue-50 text-blue-600 grid place-items-center flex-shrink-0">{I.spark}</div>
          <div className="min-w-0">
            <div className="text-[13.5px] font-semibold text-slate-900 truncate">{response.title}</div>
            <div className="text-[11px] text-slate-500">{
              response.chartType === "agent-flow"   ? `Pre-built agent · ${response.agent?.config?.dataSource || "naa-tenant"} · runs weekly Monday 10:00 AM`
            : response.chartType === "agent-report" ? `Weekly artifact · generated ${response.report?.generated || ""}`
            : isAction                              ? "Action prepared · 0.4s"
            : "Generated · 1.2s · scoped to abc-corp"
            }</div>
          </div>
        </div>
        <div className="flex items-center gap-1 flex-shrink-0">
          {showSelector && (
            <select value={chartType} onChange={e => setChartType(e.target.value)}
              className="text-[12px] border border-slate-200 rounded px-2 py-1 bg-white text-slate-600 focus-ring">
              {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          )}
          <div className="relative" ref={moreRef}>
            <button onClick={() => setMoreOpen(o => !o)}
              className="p-1.5 rounded text-slate-500 hover:bg-slate-100 focus-ring" title="More">{I.more}</button>
            {moreOpen && (
              <div className="menu-pop absolute right-0 mt-1 w-64 bg-white border border-slate-200 rounded-lg card-shadow z-20 py-1 max-h-96 overflow-y-auto">
                {menuView === "saveTo" ? (
                  <>
                    <button onClick={() => { setMenuView("main"); setNewReportName(""); setSaveToSearch(""); }} className="w-full text-left px-3 py-1.5 text-[11.5px] text-slate-500 hover:bg-slate-50 flex items-center gap-1 focus-ring">‹ Back</button>
                    <div className="h-px bg-slate-100 my-1" />
                    {activeDashboardId && onAddToDashboard && (() => {
                      const current = ALL_DASHBOARD_ITEMS.find(d => d.dashboardId === activeDashboardId)
                        || myReports.find(r => r.dashboardId === activeDashboardId);
                      if (!current) return null;
                      return (
                        <>
                          <div className="px-3 py-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold">Currently open</div>
                          <button onClick={() => { onAddToDashboard(response, activeDashboardId); closeMenu(); }}
                            className="w-full text-left px-3 py-1.5 text-[12.5px] text-blue-700 bg-blue-50/60 hover:bg-blue-100 flex items-center gap-2 focus-ring">
                            <span className="truncate flex-1 font-medium">{current.title}</span>
                            <span className="text-[9.5px] uppercase tracking-wide font-semibold text-blue-700 bg-white border border-blue-200 px-1.5 py-0.5 rounded flex-shrink-0">current</span>
                          </button>
                          <div className="h-px bg-slate-100 my-1" />
                        </>

                    })()}
                    <div className="px-3 py-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold">New report</div>
                    <div className="px-3 py-1.5 flex items-center gap-1.5">
                      <input value={newReportName} onChange={e => setNewReportName(e.target.value)}
                        onKeyDown={e => { if (e.key === "Enter" && onCreateReport) { onCreateReport(response, newReportName); closeMenu(); } }}
                        placeholder={response.title || "Report name"}
                        className="flex-1 min-w-0 text-[12px] border border-slate-200 rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400" />
                      <button onClick={() => { if (onCreateReport) onCreateReport(response, newReportName); closeMenu(); }}
                        className="text-[12px] font-medium text-white bg-blue-600 hover:bg-blue-700 rounded px-2 py-1 flex-shrink-0 focus-ring">Create</button>
                    </div>
                    <div className="h-px bg-slate-100 my-1" />
                    {(() => {
                      const others = myReports.filter(r => r.dashboardId !== activeDashboardId);
                      if (others.length === 0) {
                        return (
                          <>
                            <div className="px-3 py-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold">My reports</div>
                            <div className="px-3 py-1.5 text-[12px] text-slate-400">No reports yet — create one above.</div>
                          </>
                        );
                      }
                      // Long lists get tedious to scroll through — surface a
                      // filter box once there's enough to make typing faster
                      // than hunting.
                      const showFilter = others.length > 8;
                      const query = saveToSearch.trim().toLowerCase();
                      const matches = (r) => !query || r.title.toLowerCase().includes(query);
                      const mine = others.filter(r => !SHARED_REPORT_ACCESS[r.dashboardId] && matches(r));
                      const shared = others.filter(r => !!SHARED_REPORT_ACCESS[r.dashboardId] && matches(r));
                      return (
                        <>
                          {showFilter && (
                            <div className="px-3 py-1.5">
                              <input value={saveToSearch} onChange={e => setSaveToSearch(e.target.value)}
                                placeholder="Filter reports…" autoFocus
                                className="w-full text-[12px] border border-slate-200 rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400" />
                            </div>
                          )}
                          {mine.length === 0 && shared.length === 0 ? (
                            <div className="px-3 py-1.5 text-[12px] text-slate-400">No reports match "{saveToSearch.trim()}".</div>
                          ) : (
                            <>
                              {mine.length > 0 && (
                                <>
                                  <div className="px-3 py-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold">My reports</div>
                                  {mine.map(r => (
                                    <button key={r.dashboardId} onClick={() => { if (onSaveToReport) onSaveToReport(response, r); closeMenu(); }}
                                      className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-blue-50 hover:text-blue-700 flex items-center gap-2 focus-ring">
                                      <span className="truncate flex-1">{r.title}</span>
                                    </button>
                                  ))}
                                </>
                              )}
                              {shared.length > 0 && (
                                <>
                                  <div className="h-px bg-slate-100 my-1" />
                                  <div className="px-3 py-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold">Shared with edit access</div>
                                  {shared.map(r => (
                                    <button key={r.dashboardId} onClick={() => { if (onSaveToReport) onSaveToReport(response, r); closeMenu(); }}
                                      title={`Shared with ${SHARED_REPORT_ACCESS[r.dashboardId]}`}
                                      className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-blue-50 hover:text-blue-700 flex items-center gap-2 focus-ring">
                                      <span className="text-slate-400 flex-shrink-0">{React.cloneElement(I.share, { className: "w-3 h-3" })}</span>
                                      <span className="truncate flex-1">{r.title}</span>
                                    </button>
                                  ))}
                                </>
                              )}
                            </>
                          )}
                        </>
                      );
                    })()}
                  </>
                ) : menuView === "download" ? (
                  <>
                    <button onClick={() => setMenuView("main")} className="w-full text-left px-3 py-1.5 text-[11.5px] text-slate-500 hover:bg-slate-50 flex items-center gap-1 focus-ring">‹ Back</button>
                    <div className="h-px bg-slate-100 my-1" />
                    <div className="px-3 py-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold">Download as</div>
                    <button onClick={() => { closeMenu(); handleExport(); }}
                      className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">
                      {I.doc} CSV
                    </button>
                    <button onClick={() => { closeMenu(); onPickFollowup("Export this as a PDF", "export-pdf"); }}
                      className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">
                      {I.doc} PDF
                    </button>
                  </>
                ) : saveToMode ? (
                  <>
                    {widgetReady ? (
                      <button onClick={() => setMenuView("saveTo")} className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">
                        {I.save} <span className="flex-1">Save to</span>
                        <span className="text-slate-400">›</span>
                      </button>
                    ) : (
                      <div className="px-3 py-1.5 text-[12px] text-slate-400">Nothing to save from this card.</div>
                    )}
                    {!isAction && (
                      <button onClick={() => setMenuView("download")} className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">
                        {I.download} <span className="flex-1">Download</span>
                        <span className="text-slate-400">›</span>
                      </button>
                    )}
                  </>
                ) : menuView === "main" ? (
                  <>
                    <button onClick={() => { closeMenu(); handleShare(); }} className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">{I.share} Share conversation</button>
                    <button onClick={() => { closeMenu(); handleCopy(); }} className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">{I.copy} Copy insight</button>
                    {!isAction && (
                      <button onClick={() => setMenuView("download")} className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">
                        {I.download} <span className="flex-1">Download</span>
                        <span className="text-slate-400">›</span>
                      </button>
                    )}
                    {widgetReady && (
                      <button onClick={() => { closeMenu(); if (onSaveWidget) onSaveWidget(response); else toast(`Saved as widget — "${response.title}"`); }}
                        className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">{I.save} Save as widget</button>
                    )}
                    {widgetReady && onAddToDashboard && (
                      <button onClick={() => setMenuView("addTo")} className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">
                        {I.plus} <span className="flex-1">Add to dashboard</span>
                        <span className="text-slate-400">›</span>
                      </button>
                    )}
                    {widgetReady && activeDashboardId && onStartReplace && (
                      <button onClick={() => { closeMenu(); onStartReplace(response); }}
                        className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-slate-50 flex items-center gap-2 focus-ring">
                        {I.refresh} <span className="flex-1">Replace a widget…</span>
                      </button>
                    )}
                    <div className="h-px bg-slate-100 my-1" />
                    <button onClick={() => { closeMenu(); handleDelete(); }} className="w-full text-left px-3 py-1.5 text-[12.5px] text-rose-600 hover:bg-rose-50 flex items-center gap-2 focus-ring">{I.trash} Remove from thread</button>
                  </>
                ) : (
                  <>
                    <button onClick={() => setMenuView("main")} className="w-full text-left px-3 py-1.5 text-[11.5px] text-slate-500 hover:bg-slate-50 flex items-center gap-1 focus-ring">‹ Back</button>
                    <div className="h-px bg-slate-100 my-1" />
                    {activeDashboardId && (() => {
                      const current = activeDashboardId === "new-dashboard"
                        ? { dashboardId: "new-dashboard", title: "New Dashboard" }
                        : DASHBOARD_ITEMS.flatMap(g => g.items).find(d => d.dashboardId === activeDashboardId);
                      if (!current) return null;
                      return (
                        <>
                          <div className="px-3 py-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold">Currently open</div>
                          <button onClick={() => handleAddTo(current.dashboardId)}
                            className="w-full text-left px-3 py-1.5 text-[12.5px] text-blue-700 bg-blue-50/60 hover:bg-blue-100 flex items-center gap-2 focus-ring">
                            <span className="truncate flex-1 font-medium">{current.title}</span>
                            <span className="text-[9.5px] uppercase tracking-wide font-semibold text-blue-700 bg-white border border-blue-200 px-1.5 py-0.5 rounded flex-shrink-0">current</span>
                          </button>
                          <div className="h-px bg-slate-100 my-1" />
                        </>
                      );
                    })()}
                    <div className="px-3 py-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold">{activeDashboardId ? "Other dashboards" : "Add this chart to"}</div>
                    {DASHBOARD_ITEMS.map(group => {
                      const items = group.items.filter(d => d.dashboardId !== activeDashboardId);
                      if (items.length === 0) return null;
                      return (
                        <div key={group.folder} className="py-0.5">
                          <div className="px-3 pt-1 pb-0.5 text-[10px] uppercase tracking-wide text-slate-400 font-medium">{group.folder}</div>
                          {items.map(d => (
                            <button key={d.dashboardId} onClick={() => handleAddTo(d.dashboardId)}
                              className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-700 hover:bg-blue-50 hover:text-blue-700 flex items-center gap-2 focus-ring">
                              <span className="truncate flex-1">{d.title}</span>
                            </button>
                          ))}
                        </div>
                      );
                    })}
                    <div className="h-px bg-slate-100 my-1" />
                    <button onClick={() => { toast("New dashboard creation not in this prototype", { kind: "info" }); closeMenu(); }}
                      className="w-full text-left px-3 py-1.5 text-[12.5px] text-slate-600 hover:bg-slate-50 flex items-center gap-2 focus-ring">
                      {I.plus} New dashboard…
                    </button>
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Chart */}
      <div className={isAgent ? "px-5 pt-3 pb-1" : "p-5"}>{renderChart()}</div>

      {/* Summary */}
      {!hideInsight && (
      <div className="px-5 pb-5">
        <div className="bg-slate-50 border border-slate-200 rounded-lg p-4">
          <div className="flex items-center gap-1.5 text-[11px] uppercase tracking-wide font-semibold text-slate-500 mb-1.5">
            {I.spark} Insight
          </div>
          <p className="text-[13.5px] text-slate-700 leading-relaxed">{response.summary}</p>
        </div>
      </div>
      )}

      <div className="px-5 pb-5 flex items-start justify-between gap-4 flex-wrap">
        <div className="flex flex-wrap gap-1.5 flex-1 min-w-0">
          <span className="text-[11px] uppercase tracking-wide text-slate-400 font-semibold w-full mb-0.5">Suggested follow-ups</span>
          {response.followUps.map(q => (
            <button key={q.text} onClick={() => onPickFollowup(q.text, q.id)}
              className="text-[12.5px] px-2.5 py-1.5 rounded-full border border-slate-200 bg-white hover:border-blue-400 hover:bg-blue-50 hover:text-blue-700 text-slate-600 transition-colors focus-ring">
              {q.text}
            </button>
          ))}
        </div>
        <div className="flex items-center gap-1 flex-shrink-0 pt-5">
          <span className="text-[11px] text-slate-400 mr-1">Helpful?</span>
          {feedbackDone ? (
            <span className="text-[11.5px] text-slate-500 inline-flex items-center gap-1">{I.check} Thanks</span>
          ) : (
            <>
              <button
                onClick={() => { setFeedback("up"); setFeedbackDone(true); toast("Thanks for the feedback"); }}
                className={`p-1.5 rounded focus-ring ${feedback === "up" ? "text-emerald-600 bg-emerald-50" : "text-slate-400 hover:bg-slate-100 hover:text-emerald-600"}`}
                title="Helpful">{I.thumbsUp}</button>
              <button
                onClick={() => setFeedback(feedback === "down" ? null : "down")}
                className={`p-1.5 rounded focus-ring ${feedback === "down" ? "text-rose-600 bg-rose-50" : "text-slate-400 hover:bg-slate-100 hover:text-rose-600"}`}
                title="Not helpful">{I.thumbsDn}</button>
              <button onClick={handleCopy}
                className="p-1.5 rounded text-slate-400 hover:bg-slate-100 hover:text-slate-700 focus-ring" title="Copy insight">{I.copy}</button>
            </>
          )}
        </div>
      </div>

      {/* Negative feedback form */}
      {feedback === "down" && !feedbackDone && (
        <FeedbackForm
          onSubmit={({ reasons, text }) => {

            toast(`Thanks — recorded: ${summary}`);
          }}
          onCancel={() => setFeedback(null)}
        />
      )}
    </div>
  );
}
