/* ------------------------------ Prompt Input ----------------------------- */
function estimateTokens(s) {
  if (!s) return 0;
  return Math.max(1, Math.round(s.trim().split(/\s+/).length * 1.3));
}

function PromptInput({ onSend, busy, onPickPrompt, libraryItems = [], hideTokenCount = false, prefillValue, fullHeight = false, bottomSlot, minHeight, hideSearch = false, bare = false, suggestedPrompts, placeholder = "Ask about incidents, policies, users, or destinations…" }) {
  const toast = useToast();
  const [val, setVal] = useState("");
  const [libOpen, setLibOpen] = useState(false);
  const [suggestOpen, setSuggestOpen] = useState(false);
  const [suggestItems, setSuggestItems] = useState([]);
  const taRef = useRef(null);
  const libRef = useRef(null);
  const suggestRef = useRef(null);
  useClickOutside(libRef, () => setLibOpen(false));
  useClickOutside(suggestRef, () => setSuggestOpen(false));

  const openSuggest = () => {
    if (suggestedPrompts && suggestedPrompts.length) {
      const shuffled = [...suggestedPrompts].sort(() => Math.random() - 0.5);
      setSuggestItems(shuffled.slice(0, 10));
    }
    setSuggestOpen(o => !o);
  };

  useEffect(() => {
    if (prefillValue) { setVal(prefillValue); setTimeout(() => taRef.current?.focus(), 0); }
  }, [prefillValue]);

  useEffect(() => {
    const ta = taRef.current; if (!ta) return;
    ta.style.height = "auto";
    ta.style.height = Math.min(ta.scrollHeight, 200) + "px";
  }, [val]);

  const submit = () => {
    const v = val.trim();
    if (!v || busy) return;
    onSend(v);
    setVal("");
  };

  const onKey = e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
  };

  const tokens = estimateTokens(val);

  const innerBox = (
        <div className={`border border-slate-300 rounded-xl bg-white card-shadow focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100 transition-all flex flex-col${fullHeight ? " flex-1" : ""}`} style={minHeight ? { minHeight } : {}}>
          <textarea
            ref={taRef}
            value={val}
            onChange={e => setVal(e.target.value)}
            onKeyDown={onKey}
            rows={1}
            placeholder={placeholder}
            className="w-full resize-none bg-transparent px-4 pt-3 pb-1 text-[14px] text-slate-900 placeholder:text-slate-400 focus:outline-none"
          />
          <div className="flex-1" />
          <div className="border-t border-slate-100" />
          <div className="flex items-center justify-between px-3 pb-2.5 pt-2">
            <div className="flex items-center gap-1">
              {suggestedPrompts && (
                <div className="relative" ref={suggestRef}>
                  {suggestOpen && (
                    <div className="menu-pop absolute top-full left-0 mt-1.5 w-72 bg-white border border-slate-200 rounded-xl card-shadow z-30 overflow-hidden">
                      <div className="px-3 py-2 border-b border-slate-100 flex items-center justify-between">
                        <span className="text-[11px] uppercase tracking-wide text-slate-500 font-semibold">Suggested Prompts</span>
                        <button onClick={openSuggest} className="text-[11px] text-blue-500 hover:text-blue-700 font-medium">Refresh</button>
                      </div>
                      <div className="py-1 max-h-72 overflow-y-auto">
                        {suggestItems.map((p, i) => (
                          <button key={i} onClick={() => { setVal(p); setSuggestOpen(false); taRef.current?.focus(); }}
                            className="w-full text-left px-3 py-2 text-[12.5px] text-slate-700 hover:bg-blue-50 hover:text-blue-700 transition-colors flex items-start gap-2">
                            <span className="text-slate-300 mt-0.5 flex-shrink-0">{I.spark}</span>
                            <span>{p}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                  <button onClick={openSuggest}
                    className={`inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-[12px] font-medium transition-all ${suggestOpen ? "bg-blue-50 text-blue-600" : "text-slate-500 hover:bg-slate-100 hover:text-slate-700"}`}>
                    <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                      style={{color:"#f59e0b",filter:"drop-shadow(0 0 4px rgba(251,191,36,0.85))"}}>
                      <path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.22-1.21 4.16-3 5.2V17a1 1 0 0 1-1 1H10a1 1 0 0 1-1-1v-2.8C7.21 13.16 6 11.22 6 9a6 6 0 0 1 6-6z"/>
                    </svg>
                    Suggested Prompts
                    <svg className={`w-3 h-3 transition-transform ${suggestOpen ? "rotate-180" : ""}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="6 9 12 15 18 9"/>
                    </svg>
                  </button>
                </div>
              )}
              <div className="relative" ref={libRef}>
                {libOpen && (
                  <div className="menu-pop absolute bottom-full left-0 mb-1 w-80 bg-white border border-slate-200 rounded-xl card-shadow z-30 overflow-hidden">
                    <div className="px-3 py-2 border-b border-slate-200 text-[11px] uppercase tracking-wide text-slate-500 font-semibold">Prompt library</div>
                    <div className="max-h-64 overflow-y-auto py-1">
                      {libraryItems.map(group => (
                        <div key={group.folder} className="py-1">
                          <div className="px-3 py-1 text-[10.5px] uppercase tracking-wide text-slate-400 font-semibold">{group.folder}</div>
                          {group.items.map(p => (
                            <button key={p} onClick={() => { setLibOpen(false); setVal(p); taRef.current?.focus(); }}
                              className="w-full text-left px-3 py-1.5 text-[13px] text-slate-700 hover:bg-blue-50 hover:text-blue-700 focus-ring flex items-center gap-2">
                              <span className="text-slate-400">{I.spark}</span> {p}
                            </button>
                          ))}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
              {!hideSearch && <button onClick={() => toast("Data search is read-only in this prototype", { kind: "info" })}
                className="p-1.5 rounded text-slate-400 hover:bg-slate-100 hover:text-slate-600 focus-ring" title="Search data">{I.search}</button>}

            </div>
            <button
              onClick={submit}
              disabled={!val.trim() || busy}
              className="inline-flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 text-white text-[13px] font-medium px-3 py-1.5 rounded-lg transition-colors focus-ring">
              {busy ? <>{I.refresh} Working…</> : <>Send {I.send}</>}
            </button>
          </div>
          {bottomSlot && <div className="border-t border-slate-100">{bottomSlot}</div>}
        </div>
  );
  if (bare) return innerBox;
  return (
    <div className={fullHeight ? "h-full flex flex-col" : "border-t border-slate-200 bg-white"}>
      <div className={fullHeight ? "h-full flex flex-col" : "max-w-4xl mx-auto px-6 py-4"}>
        {innerBox}
        <div className="text-[11px] text-slate-400 text-center mt-2">
          AI-generated insights may be inaccurate. Always verify before acting on regulated data.
        </div>
      </div>
    </div>
  );
}

function DashboardGallery({ onClose, onPickDashboard, onNewDashboard, favoriteDashboardIds = [], onToggleFavorite }) {
  const [query, setQuery]           = React.useState("");
  const [tagFilters, setTagFilters] = React.useState(["All"]);
  const toggleTag = (t) => setTagFilters(prev => {
    if (t === "All") return ["All"];
    const next = prev.includes(t) ? prev.filter(x => x !== t) : [...prev.filter(x => x !== "All"), t];
    return next.length === 0 ? ["All"] : next;
  });
  const [roleFilter, setRoleFilter] = React.useState("All");

  const allItems = DASHBOARD_ITEMS.flatMap(g => g.items.map(d => ({ ...d, folder: g.folder })));
  const allTags    = ["All", "Favorite", ...DASHBOARD_ITEMS.map(g => g.folder).filter(f => !["CISO","Security Analyst","GenAI Admin"].includes(f))];
  const allPersonas = ["All", "Security Leader", "Security Engineer", "CISO", "Security Analyst", "GenAI Admin"];

  const filtered = allItems.filter(d => {
    const q = query.toLowerCase();
    const matchQ = !q || d.title.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q) || d.folder.toLowerCase().includes(q);
    const matchTag  = tagFilters.includes("All") || tagFilters.some(t => t === "Favorite" ? favoriteDashboardIds.includes(d.dashboardId) : (d.folder === t || (d.personas || []).includes(t)));
    const matchRole = roleFilter === "All" || (d.personas || []).includes(roleFilter);
    return matchQ && matchTag && matchRole;
  });

  const FilterChip = ({ label, active, onClick }) => (
    <button onClick={onClick}
      className={`px-3 py-1 rounded-full text-[12px] font-medium border transition-all ${active ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-600 border-slate-200 hover:border-slate-300 hover:bg-slate-50"}`}>
      {label}
    </button>
  );

  return (
    <div className="flex-1 flex flex-col bg-slate-50 overflow-hidden">
      {/* Header */}
      <div className="flex items-center gap-4 px-6 py-3.5 bg-white border-b border-slate-200 flex-shrink-0">
        <h1 className="text-[15px] font-semibold text-slate-900">Netskope Reports</h1>
        <span className="text-[12px] text-slate-400">{filtered.length} of {allItems.length}</span>
        {/* Blank "New report" entry point hidden — new reports are created only
            from the chat flow (Save to → New report) or by editing an existing
            Library report. Set `false` back to `true` to re-enable. */}
        {false && (
        <button onClick={onNewDashboard}
          className="ml-auto inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-[12.5px] font-medium transition-colors">
          <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>
          New report
        </button>
        )}
      </div>

      {/* Search + Filters */}
      <div className="px-6 py-4 bg-white border-b border-slate-200 flex-shrink-0 flex flex-col gap-3">
        <div className="relative">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" d="m21 21-4.35-4.35"/></svg>
          <input value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Search reports…"
            className="w-full pl-9 pr-4 py-2 text-[13px] border border-slate-200 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-400" />
        </div>
        <div className="flex flex-col gap-2">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-[13px] tracking-wide text-slate-400 font-semibold w-16 flex-shrink-0">Tag</span>
            {allTags.map(t => <FilterChip key={t} label={t} active={tagFilters.includes(t)} onClick={() => toggleTag(t)} />)}
          </div>
        </div>
      </div>

      {/* Grid */}
      <div className="flex-1 overflow-y-auto px-6 py-6">
        {filtered.length === 0 ? (
          <div className="flex flex-col items-center justify-center h-40 text-slate-400">
            <svg className="w-8 h-8 mb-2 opacity-40" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <p className="text-[13px]">No dashboards match your filters</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 gap-4" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))" }}>
            {filtered.map(d => {
              const isFavorite = favoriteDashboardIds.includes(d.dashboardId);
              return (
                <div key={d.dashboardId} onClick={() => onPickDashboard(d)} role="button" tabIndex={0}
                  className="text-left bg-white rounded-xl border border-slate-200 hover:border-blue-300 hover:shadow-md transition-all overflow-hidden group cursor-pointer">
                  <div className="p-4">
                    <div className="flex items-start justify-between gap-2 mb-1.5">
                      <span className="text-[14px] font-semibold text-slate-900 leading-snug group-hover:text-blue-700 transition-colors">{d.title}</span>
                      <button onClick={(e) => { e.stopPropagation(); onToggleFavorite && onToggleFavorite(d.dashboardId); }}

                        className="flex-shrink-0 p-0.5 rounded hover:bg-slate-100 transition-colors">
                        <svg className={`w-4 h-4 transition-colors ${isFavorite ? "fill-amber-400 text-amber-400" : "fill-none text-slate-300 hover:text-slate-400"}`} viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                      </button>
                    </div>
                    <p className="text-[12px] text-slate-500 leading-relaxed mb-3">{d.desc}</p>
                    <div className="flex flex-wrap gap-1.5">
                      {REPORT_ABOUT[d.dashboardId] && (
                        <span className="inline-flex items-center gap-1 text-[10.5px] font-medium px-2 py-0.5 rounded-full bg-blue-50 text-blue-700 border border-blue-100"
                              title="This report is based on a template from the Netskope report library">
                          {React.cloneElement(I.book, { className: "w-3 h-3" })}Netskope Library
                        </span>
                      )}
                      {isFavorite && (
                        <span className="text-[10.5px] font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">Favorite</span>
                      )}
                      {[...new Set([d.folder, ...(d.personas || [])])].map(tag => (
                        <span key={tag} className="text-[10.5px] font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">{tag}</span>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function SpaceGallery({ onPickDashboard, favoriteDashboardIds = [], onToggleFavorite, dashboards = [] }) {
  /* My Reports = reports you own/have edit access to (`dashboards`), plus
     any Netskope Library report you've favorited for quick access — a
     favorite is just a bookmark, not a copy, so it's flagged with a
     "Netskope Library" badge rather than folded into your owned reports. */
  const ownedIds = new Set(dashboards.map(d => d.dashboardId));
  const favoritedLibraryItems = ALL_DASHBOARD_ITEMS.filter(d => favoriteDashboardIds.includes(d.dashboardId) && !ownedIds.has(d.dashboardId));
  const myDashboards = [...dashboards, ...favoritedLibraryItems];
  const [accessState, setAccessState] = React.useState(() => {
    const defaults = Object.fromEntries(myDashboards.map(d => [d.dashboardId, { level: "only-me", role: "View", people: [] }]));
    defaults["security-engineer"] = { level: "netskope", role: "View", people: [] };
    defaults["dlp-overview"] = {
      level: "specific",
      role: "View",
      people: [
        { email: "aarondemo@netskope.com", role: "Edit" },
        { email: "maydemo@netskope.com",   role: "View" },
        { email: "jamesdemo@netskope.com", role: "View" },
      ],
    };
    return defaults;
  });
  const [openModal, setOpenModal] = React.useState(null); // dashboardId
  const [emailInput, setEmailInput] = React.useState("");
  const [addRole, setAddRole] = React.useState("Viewer");
  const [query, setQuery] = React.useState("");
  const [filterLevels, setFilterLevels] = React.useState(["all"]);
  const [tagFilters, setTagFilters] = React.useState(["All"]);
  const toggleLevel = (id) => setFilterLevels(prev => {
    if (id === "all") return ["all"];
    const next = prev.includes(id) ? prev.filter(x => x !== id) : [...prev.filter(x => x !== "all"), id];
    return next.length === 0 ? ["all"] : next;
  });
  const toggleTag = (t) => setTagFilters(prev => {
    if (t === "All") return ["All"];
    const next = prev.includes(t) ? prev.filter(x => x !== t) : [...prev.filter(x => x !== "All"), t];
    return next.length === 0 ? ["All"] : next;
  });

  // Recurrence state
  const [recurState, setRecurState] = React.useState(() =>
    Object.fromEntries(myDashboards.map(d => [d.dashboardId, { schedules: [] }]))
  );
  const [openRecurModal, setOpenRecurModal] = React.useState(null);
  const [recurEmail, setRecurEmail] = React.useState("");
  const [recurFreq, setRecurFreq] = React.useState("weekly");
  const [recurDays, setRecurDays] = React.useState(["Mon"]);
  const [recurMonthDay, setRecurMonthDay] = React.useState("1st");
  const [recurTime, setRecurTime] = React.useState("09:00");
  const [recurRole, setRecurRole] = React.useState("View");
  const [recurFormat, setRecurFormat] = React.useState("PDF");

  const WEEKDAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const MONTH_DAYS = ["1st","2nd","3rd","4th","5th","6th","7th","8th","9th","10th","11th","12th","13th","14th","15th","16th","17th","18th","19th","20th","21st","22nd","23rd","24th","25th","26th","27th","28th","29th","30th","31st","Last day"];

  const addSchedule = (dashboardId) => {
    const email = recurEmail.trim();
    if (!email) return;
    const label = recurFreq === "daily"   ? `Daily at ${recurTime}` :
                  recurFreq === "weekly"  ? `Weekly · ${recurDays.join(", ")} at ${recurTime}` :
                                            `Monthly · ${recurMonthDay} at ${recurTime}`;
    setRecurState(prev => ({
      ...prev,
      [dashboardId]: { schedules: [...prev[dashboardId].schedules, { id: Date.now(), email, role: recurRole, format: recurFormat, freq: recurFreq, days: [...recurDays], monthDay: recurMonthDay, time: recurTime, label }] }
    }));
    setRecurEmail("");
  };

  const removeSchedule = (dashboardId, id) => {
    setRecurState(prev => ({
      ...prev,
      [dashboardId]: { schedules: prev[dashboardId].schedules.filter(s => s.id !== id) }

      ...prev,
      [dashboardId]: { ...prev[dashboardId], people: [...(prev[dashboardId].people || []), { email, role: addRole }] }
    }));
    setEmailInput("");

  const removePerson = (dashboardId, email) => {

  ];

  const modal = openModal ? myDashboards.find(d => d.dashboardId === openModal) : null;

  const allTags = ["All", "Favorite", ...new Set(myDashboards.map(d => d.folder).filter(Boolean))];

  const matchesFilter = (d) => {

    const matchTag = tagFilters.includes("All") || tagFilters.some(t => t === "Favorite" ? favoriteDashboardIds.includes(d.dashboardId) : d.folder === t);
    return matchQ && matchLevel && matchTag;
  };
  const filteredDashboards = myDashboards.filter(matchesFilter);

  return (
    <div className="flex-1 flex flex-col bg-slate-50 overflow-hidden">
      <div className="flex items-center gap-3 px-6 py-3.5 bg-white border-b border-slate-200 flex-shrink-0">
        <svg className="w-4 h-4 text-slate-500" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" strokeWidth="1.4"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
        <h1 className="text-[15px] font-semibold text-slate-900">My Reports</h1>
        <span className="text-[12px] text-slate-400">{filteredDashboards.length} of {myDashboards.length} reports</span>
      </div>
      <div className="px-6 py-4 bg-white border-b border-slate-200 flex-shrink-0">
        <div className="relative">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" d="m21 21-4.35-4.35"/></svg>
          <input value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Search reports…"
            className="w-full pl-9 pr-4 py-2 text-[13px] border border-slate-200 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-400" />
        </div>
      </div>
      {/* Access filter hidden for now — set `false` back to `true` (or remove the guard) to re-enable. */}
      {false && (
      <div className="flex items-center gap-2 px-6 py-2.5 bg-white border-b border-slate-100 flex-shrink-0">
        <svg className="w-3.5 h-3.5 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 16 16" stroke="currentColor" strokeWidth="1.5"><path strokeLinecap="round" d="M2 4h12M4 8h8M6 12h4"/></svg>
        <span className="text-[11.5px] text-slate-400 font-medium mr-1">Access:</span>
        {[
          { id: "all",      label: "All" },
          { id: "only-me",  label: "Only me" },
          { id: "netskope", label: "Everyone at my organization" },
          { id: "specific", label: "Specific people" },
        ].map(f => (
          <button key={f.id} onClick={() => toggleLevel(f.id)}
            className={`px-2.5 py-1 rounded-full text-[12px] font-medium transition-all ${filterLevels.includes(f.id) ? "bg-blue-600 text-white" : "text-slate-500 hover:bg-slate-100"}`}>
            {f.label}
          </button>
        ))}
      </div>
      )}
      <div className="flex items-center gap-2 px-6 py-2.5 bg-white border-b border-slate-100 flex-shrink-0">
        <svg className="w-3.5 h-3.5 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 16 16" stroke="currentColor" strokeWidth="1.5"><path strokeLinecap="round" d="M2 4l6 6v4l2 1V10l6-6H2z"/></svg>
        <span className="text-[11.5px] text-slate-400 font-medium mr-1">Tag:</span>
        {allTags.map(t => (
          <button key={t} onClick={() => toggleTag(t)}
            className={`px-2.5 py-1 rounded-full text-[12px] font-medium transition-all ${tagFilters.includes(t) ? "bg-blue-600 text-white" : "text-slate-500 hover:bg-slate-100"}`}>

      </div>
      <div className="flex-1 overflow-y-auto px-6 py-4">
        <div className="flex flex-col gap-2">
          {filteredDashboards.map(d => {
            const acc = accessState[d.dashboardId] || { level: "only-me", role: "View", people: [] };
            const levelInfo = ACCESS_LEVELS.find(l => l.id === acc.level);
            const isFavorite = favoriteDashboardIds.includes(d.dashboardId);
            const isLibraryOnly = !ownedIds.has(d.dashboardId);
            return (

                            {React.cloneElement(I.book, { className: "w-3 h-3" })}
                            Netskope Library
                          </span>

                        {isFavorite && (
                          <span className="text-[10.5px] font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 flex-shrink-0">Favorite</span>

                      </div>
                      <button className="text-left block group" onClick={() => onPickDashboard(d)}>
                        <div className="text-[12px] text-slate-500 leading-relaxed">{d.desc}</div>

                  <div className="flex items-center gap-2 flex-shrink-0">
                    {/* Per-report share button hidden for now — set `false` back to `true` (or remove the guard) to re-enable. */}

              <div className="mb-4 flex flex-col gap-1.5">

                  <div key={p.email} className="flex items-center justify-between px-3 py-2 rounded-lg bg-slate-50">
                    <div className="flex items-center gap-2">
                      <span className="w-7 h-7 rounded-full bg-blue-100 text-blue-700 text-[10px] font-semibold flex items-center justify-center">{p.email[0].toUpperCase()}</span>
                      <span className="text-[13px] text-slate-700">{p.email}</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="flex items-center bg-white border border-slate-200 rounded-lg overflow-hidden">
                        {["View","Edit"].map(r => (
                          <button key={r} onClick={() => setAccessState(prev => ({ ...prev, [openModal]: { ...prev[openModal], people: prev[openModal].people.map(pp => pp.email === p.email ? { ...pp, role: r } : pp) } }))}
                            className={`px-2.5 py-1 text-[11.5px] font-medium transition-colors ${p.role === r ? "bg-blue-600 text-white" : "text-slate-500 hover:bg-slate-50"}`}>
                            {r}
                          </button>
                        ))}
                      </div>
                      <button onClick={() => removePerson(openModal, p.email)} className="text-slate-300 hover:text-red-400 transition-colors">
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Access level selector */}
            <div className="border-t border-slate-100 pt-4">
              <p className="text-[11.5px] text-slate-400 font-medium mb-2 uppercase tracking-wide">General access</p>
              <div className="flex flex-col gap-1">
                {ACCESS_LEVELS.map(l => (
                  <div key={l.id} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${modalAccess.level === l.id ? "bg-blue-50 border border-blue-200" : "hover:bg-slate-50 border border-transparent"}`}>
                    <button className="flex items-center gap-3 flex-1 text-left" onClick={() => setAccessState(prev => ({ ...prev, [openModal]: { ...prev[openModal], level: l.id } }))}>
                      <span className={modalAccess.level === l.id ? "text-blue-600" : "text-slate-400"}>{l.icon}</span>
                      <span className={`text-[13px] font-medium ${modalAccess.level === l.id ? "text-blue-700" : "text-slate-700"}`}>{l.label}</span>
                      {modalAccess.level === l.id && <svg className="w-4 h-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>}
                    </button>
                    {modalAccess.level === l.id && l.id !== "specific" && l.id !== "only-me" && (
                      <div className="flex items-center bg-white border border-slate-200 rounded-lg overflow-hidden flex-shrink-0">
                        {["View","Edit"].map(r => (
                          <button key={r} onClick={() => setAccessState(prev => ({ ...prev, [openModal]: { ...prev[openModal], role: r } }))}
                            className={`px-3 py-1 text-[12px] font-medium transition-colors ${modalAccess.role === r ? "bg-blue-600 text-white" : "text-slate-500 hover:bg-slate-50"}`}>
                            {r}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            <button onClick={() => setOpenModal(null)}
              className="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white text-[13px] font-medium py-2 rounded-xl transition-colors">
              Done
            </button>
          </div>
        </div>
      )}

      {/* Recurrence Modal */}
      {openRecurModal && recurModal && (
        <div className="fixed inset-0 bg-black/30 z-50 flex items-center justify-center p-4" onClick={() => setOpenRecurModal(null)}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="text-[15px] font-semibold text-slate-900">Schedule delivery</h2>
                <p className="text-[12px] text-slate-400 mt-0.5">{recurModal.title}</p>
              </div>
              <button onClick={() => setOpenRecurModal(null)} className="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>

            {/* Existing schedules */}
            {recurState[openRecurModal]?.schedules.length > 0 && (
              <div className="mb-4 flex flex-col gap-1.5">
                <p className="text-[11px] uppercase tracking-wide text-slate-400 font-semibold mb-1">Active schedules</p>
                {recurState[openRecurModal].schedules.map(s => (
                  <div key={s.id} className="flex items-center justify-between px-3 py-2.5 rounded-xl bg-slate-50 border border-slate-100">
                    <div className="flex items-center gap-2.5 min-w-0">
                      <span className="w-7 h-7 rounded-full bg-blue-100 text-blue-700 text-[10px] font-semibold flex items-center justify-center flex-shrink-0">{s.email[0].toUpperCase()}</span>
                      <div className="min-w-0">
                        <p className="text-[12.5px] text-slate-700 truncate">{s.email}</p>
                        <p className="text-[11px] text-slate-400">{s.label} · {s.format}</p>
                      </div>
                    </div>
                    <button onClick={() => removeSchedule(openRecurModal, s.id)} className="text-slate-300 hover:text-red-400 transition-colors flex-shrink-0 ml-2">
                      <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                  </div>
                ))}
              </div>
            )}

            {/* New schedule form */}
            <div className="border-t border-slate-100 pt-4 flex flex-col gap-3">
              <p className="text-[11px] uppercase tracking-wide text-slate-400 font-semibold">New schedule</p>

              {/* Recipient */}
              <div>
                <label className="text-[12px] text-slate-500 font-medium mb-1 block">Send to</label>
                <input value={recurEmail} onChange={e => setRecurEmail(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addSchedule(openRecurModal)}
                  placeholder="name@netskope.com"
                  className="w-full text-[13px] border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-400" />
              </div>

              {/* Frequency */}
              <div>
                <label className="text-[12px] text-slate-500 font-medium mb-1.5 block">Recurrence</label>
                <div className="flex gap-1.5">
                  {[{id:"daily",label:"Daily"},{id:"weekly",label:"Weekly"},{id:"monthly",label:"Monthly"}].map(f => (
                    <button key={f.id} onClick={() => setRecurFreq(f.id)}
                      className={`flex-1 py-1.5 rounded-lg text-[12.5px] font-medium border transition-all ${recurFreq === f.id ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-600 border-slate-200 hover:border-slate-300 hover:bg-slate-50"}`}>
                      {f.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Weekly — day picker */}
              {recurFreq === "weekly" && (
                <div>
                  <label className="text-[12px] text-slate-500 font-medium mb-1.5 block">On</label>
                  <div className="flex gap-1">
                    {WEEKDAYS.map(day => (
                      <button key={day} onClick={() => setRecurDays(prev => prev.includes(day) ? prev.filter(x => x !== day) : [...prev, day])}
                        className={`flex-1 py-1 rounded-md text-[11.5px] font-medium border transition-all ${recurDays.includes(day) ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-500 border-slate-200 hover:border-slate-300"}`}>
                        {day}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Monthly — day picker */}
              {recurFreq === "monthly" && (
                <div>
                  <label className="text-[12px] text-slate-500 font-medium mb-1.5 block">On the</label>
                  <div className="relative">
                    <div className="flex gap-1.5 overflow-x-auto pb-1" style={{scrollbarWidth:"none"}}>
                      {MONTH_DAYS.map(day => (
                        <button key={day} onClick={() => setRecurMonthDay(day)}
                          className={`flex-shrink-0 px-3 py-1 rounded-lg text-[12px] font-medium border transition-all ${recurMonthDay === day ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-500 border-slate-200 hover:border-slate-300"}`}>
                          {day}
                        </button>
                      ))}
                    </div>
                    <div className="pointer-events-none absolute right-0 top-0 bottom-1 w-8 flex items-center justify-end"
                      style={{background:"linear-gradient(to right, transparent, white)"}}>
                      <svg className="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>
                    </div>
                  </div>
                </div>
              )}

              {/* Time */}
              <div>
                <label className="text-[12px] text-slate-500 font-medium mb-1 block">At</label>
                <input type="time" value={recurTime} onChange={e => setRecurTime(e.target.value)}
                  className="text-[13px] border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-slate-700" />
              </div>

              {/* Format */}
              <div>
                <label className="text-[12px] text-slate-500 font-medium mb-1.5 block">Format</label>
                <div className="flex gap-1.5">
                  {["PDF","CSV","PNG"].map(f => (
                    <button key={f} onClick={() => setRecurFormat(f)}
                      className={`flex-1 py-1.5 rounded-lg text-[12.5px] font-medium border transition-all ${recurFormat === f ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-600 border-slate-200 hover:border-slate-300 hover:bg-slate-50"}`}>
                      {f}
                    </button>
                  ))}
                </div>
              </div>

              <button onClick={() => addSchedule(openRecurModal)} disabled={!recurEmail.trim() || (recurFreq === "weekly" && recurDays.length === 0)}
                className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 text-white text-[13px] font-medium py-2 rounded-xl transition-colors mt-1">
                Add schedule
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ------------------------------ Agent Gallery ----------------------------- */
const STATUS_COLORS = {
  "Success": { bg: "#dcfce7", text: "#166534", bar: "#10b981" },
  "Draft":   { bg: "#f1f5f9", text: "#475569", bar: "#94a3b8" },
  "Running": { bg: "#dbeafe", text: "#1e40af", bar: "#3b82f6" },
  "Failed":  { bg: "#fee2e2", text: "#b91c1c", bar: "#ef4444" },
};

function AgentGallery({ onClose, onPickAgent, allAgents }) {
  const [query, setQuery]           = React.useState("");
  const [catFilter, setCatFilter]   = React.useState("All");
  const [statusFilter, setStatusFilter] = React.useState("All");

  const allCats    = ["All", ...Array.from(new Set(allAgents.map(a => a.category || "Other")))];
  const allStatuses = ["All", ...Array.from(new Set(allAgents.map(a => a.status || "—").filter(s => s !== "—")))];

  const filtered = allAgents.filter(a => {
    const q = query.toLowerCase();
    const matchQ = !q || a.name.toLowerCase().includes(q) || (a.desc || "").toLowerCase().includes(q) || (a.category || "").toLowerCase().includes(q);
    const matchCat    = catFilter    === "All" || (a.category || "Other") === catFilter;
    const matchStatus = statusFilter === "All" || (a.status || "—") === statusFilter;
    return matchQ && matchCat && matchStatus;
  });

  const FilterChip = ({ label, active, onClick }) => (
    <button onClick={onClick}
      className={`px-3 py-1 rounded-full text-[12px] font-medium border transition-all ${active ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-600 border-slate-200 hover:border-slate-300 hover:bg-slate-50"}`}>
      {label}
    </button>
  );

  return (
    <div className="flex-1 flex flex-col bg-slate-50 overflow-hidden">
      {/* Header */}
      <div className="flex items-center gap-4 px-6 py-3.5 bg-white border-b border-slate-200 flex-shrink-0">
        <h1 className="text-[15px] font-semibold text-slate-900">Agents</h1>
        <span className="text-[12px] text-slate-400">{filtered.length} of {allAgents.length}</span>
        <button onClick={() => onPickAgent({ id: "agent-new", name: "New agent", isNew: true })}
          className="ml-auto inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-[12.5px] font-medium transition-colors">
          <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>
          New agent
        </button>
      </div>

      {/* Search + Filters */}
      <div className="px-6 py-4 bg-white border-b border-slate-200 flex-shrink-0 flex flex-col gap-3">
        <div className="relative">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" d="m21 21-4.35-4.35"/></svg>
          <input value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Search agents…"
            className="w-full pl-9 pr-4 py-2 text-[13px] border border-slate-200 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-400" />
        </div>
        <div className="flex flex-col gap-2">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-[13px] tracking-wide text-slate-400 font-semibold w-16 flex-shrink-0">Category</span>
            {allCats.map(c => <FilterChip key={c} label={c} active={catFilter === c} onClick={() => setCatFilter(c)} />)}
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-[13px] tracking-wide text-slate-400 font-semibold w-16 flex-shrink-0">Status</span>
            {allStatuses.map(s => <FilterChip key={s} label={s} active={statusFilter === s} onClick={() => setStatusFilter(s)} />)}
          </div>
        </div>
      </div>

      {/* Grid */}
      <div className="flex-1 overflow-y-auto px-6 py-6">
        {filtered.length === 0 ? (
          <div className="flex flex-col items-center justify-center h-40 text-slate-400">
            <svg className="w-8 h-8 mb-2 opacity-40" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2m-3.22-6.78-1.42 1.42M5.64 18.36l-1.42 1.42M18.36 18.36l-1.42-1.42M5.64 5.64 4.22 4.22"/></svg>
            <p className="text-[13px]">No agents match your filters</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 gap-4" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))" }}>
            {filtered.map(a => {
              const sc = STATUS_COLORS[a.status] || STATUS_COLORS["Draft"];
              return (
                <button key={a.id} onClick={() => onPickAgent(a)}
                  className="text-left bg-white rounded-xl border border-slate-200 hover:border-blue-300 hover:shadow-md transition-all overflow-hidden group">
                  <div className="h-1 w-full" style={{ backgroundColor: sc.bar }} />
                  <div className="p-4">
                    <div className="flex items-start justify-between gap-2 mb-1.5">
                      <span className="text-[14px] font-semibold text-slate-900 leading-snug group-hover:text-blue-700 transition-colors">{a.name}</span>
                      <span className="text-[10.5px] font-medium px-2 py-0.5 rounded-full flex-shrink-0 mt-0.5" style={{ backgroundColor: sc.bg, color: sc.text }}>{a.status || "—"}</span>
                    </div>
                    <p className="text-[12px] text-slate-500 leading-relaxed mb-3">{a.desc}</p>
                    <div className="flex items-center gap-2 flex-wrap">
                      {a.category && (
                        <span className="text-[10.5px] font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">{a.category}</span>
                      )}
                      {a.lastRunDate && a.lastRunDate !== "—" && (
                        <span className="text-[10.5px] text-slate-400">Last run {a.lastRunDate}</span>
                      )}
                      {a.nextRunDate && a.nextRunDate !== "—" && (
                        <span className="text-[10.5px] text-slate-400">· Next {a.nextRunDate}</span>
                      )}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* Split a single chat submission into distinct questions so each one can get
   its own widget. A submission counts as multiple questions when it spans
   several lines (Shift+Enter) or contains several "?"-terminated clauses.
   Text with no line breaks and no "?" is treated as a single question. */
function splitQuestions(text) {
  const parts = [];
  String(text).split(/\r?\n+/).forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;
    // Break a line into separate questions on "?" (keeping the mark).
    const segs = trimmed.match(/[^?]+\?+|[^?]+$/g);
    if (segs) {
      segs.forEach(s => { const t = s.trim(); if (t) parts.push(t); });
    } else {
      parts.push(trimmed);
    }
  });
  return parts.length ? parts : [String(text).trim()];
}

function classifyPrompt(text) {
  const t = text.toLowerCase();
  if (/\b(kpi|key metric|summary metric|top[- ]line|create.*kpi|build.*kpi|kpi row|metric row|scorecard)\b/.test(t)) return "kpi-row-custom";
  if (/\b(export|download|csv|xlsx|excel|spreadsheet)\b/.test(t)) return "action-export";
  if (/\b(pdf)\b/.test(t)) return "export-pdf";
  if (/\b(slack|channel|#dlp)\b/.test(t)) return "slack-sent";
  if (/\b(schedule|recurring|weekly|every monday)\b/.test(t)) return "schedule-confirmed";
  if (/\b(forecast|predict|next 7 days|next week)\b/.test(t)) return "forecast-7d";
  if (/\b(split|break.?down|group(ed)?)\s+(it\s+)?by\s+(severity|risk)/.test(t)) return "severity";
  if (/\b(split|break.?down|group(ed)?)\s+(it\s+)?by\s+(polic(y|ies))/.test(t)) return "top-policies";
  if (/\b(split|break.?down|group(ed)?)\s+(it\s+)?by\s+(destination|app|cloud)/.test(t)) return "destinations";
  if (/\b(department|dept|by team|by org|business unit|\bbu\b|cohort|user group|by group|split by user|split by team)\b/.test(t)) return "by-department";
  if (/\b(24[- ]?hours?|today|past day|last day)\b/.test(t)) return "last-24h";
  if (/\b(critical only|only critical|just critical)\b/.test(t)) return "critical-only";
  if (/\b(severity)\b/.test(t)) return "severity";
  if (/\b(forecast|predict)\b/.test(t)) return "forecast-7d";
  if (/\b(j\.morales|jmorales|morales)\b/.test(t)) return "user-detail-jmorales";
  if (/\b(k\.tanaka|tanaka)\b/.test(t)) return "user-policies-ktanaka";
  if (/\b(saturday spike|spike)\b/.test(t)) return "rca-saturday";
  if (/\bblock|recommend|policy update\b/.test(t)) return "block-recommendation";
  if (/\b30[- ]?day|month|trend\b/.test(t)) return "trend-30d";
  if (/\b(week|7[- ]?day|this week)\b/.test(t) && /(overview|summary|incident)/.test(t)) return "weekly-overview";
  if (/policy|policies/.test(t)) return "top-policies";
  if (/user|people|who/.test(t)) return "top-users";
  if (/destination|app|cloud|where|drive|dropbox/.test(t)) return "destinations";
  return "freeform";
}

/* ---------------------------- Dashboard renderer --------------------------- */
const SPAN = { full: 6, "2/3": 4, half: 3, "1/3": 2 };
const SIZES_BY_TYPE = {
  kpi:    ["full"],
  table:  ["half", "full"],
  line:   ["half", "full"],
  hbar:   ["1/3", "half", "full"],
  donut:  ["1/3", "half", "full"],
  gauge:  ["1/3", "half"],
  sankey: ["full"],
  map:    ["half", "full"],
};

function Widget({ widget, added, onDrill, onRemove, replaceMode, onReplaceClick, onRename, onResize, dragEnabled, isDragging, isDropTarget, widgetRef, displayIdx, onDragHandleMouseDown }) {
  const span = SPAN[widget.size] || 6;
  const currentSize = widget.size === "1/3" ? "1/3" : widget.size === "half" ? "half" : "full";
  const SizeBtn = ({ size, label, bars }) => (
    <button onClick={(e) => { e.stopPropagation(); onResize(size); }} title={label}
      className={`p-1 rounded focus-ring transition-colors ${currentSize === size ? "bg-blue-50 text-blue-600" : "text-slate-300 hover:text-slate-600 hover:bg-slate-100"}`}>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5">
        {bars}
      </svg>
    </button>
  );
  return (
    <div ref={widgetRef}
         data-widget-idx={displayIdx}
         className={`group relative bg-white rounded-xl p-4 card-shadow border transition-all ${
            replaceMode ? "border-blue-400 ring-2 ring-blue-200 cursor-pointer hover:ring-blue-400 hover:border-blue-500" :
            isDropTarget ? "border-blue-500 ring-2 ring-blue-300" :
            isDragging ? "border-slate-200 opacity-40" :
            added ? "border-blue-300 ring-1 ring-blue-100" : "border-slate-200"
         }`}
         style={{ gridColumn: `span ${span} / span ${span}` }}
         onClick={replaceMode && onReplaceClick ? onReplaceClick : undefined}
         role={replaceMode ? "button" : undefined}>
      {(widget.title || added) && (
        <div className="flex items-center justify-between gap-2 mb-3">
          {dragEnabled && (
            <button type="button"
              onPointerDown={onDragHandleMouseDown}
              onMouseDown={onDragHandleMouseDown}
              title="Drag to reorder"
              className="cursor-grab active:cursor-grabbing text-slate-400 hover:text-slate-700 hover:bg-slate-100 flex-shrink-0 -ml-1 rounded p-0.5 select-none focus-ring">
              {I.grip}
            </button>
          )}
          <div className="text-[12.5px] font-semibold text-slate-800 truncate min-w-0 flex-1">
            {onRename && !replaceMode
              ? <EditableTitle value={widget.title} onSave={onRename} className="text-[12.5px] font-semibold text-slate-800" inputClassName="text-[12.5px] font-semibold text-slate-800 w-full" />
              : widget.title}
          </div>
          <div className="flex items-center gap-1 flex-shrink-0">
            {onResize && !replaceMode && (() => {
              const allowed = SIZES_BY_TYPE[widget.type] || ["1/3", "half", "full"];
              if (allowed.length < 2) return null;
              const ICONS = {
                "1/3":  <><rect x="1" y="3" width="3" height="8" rx="0.5"/><rect x="5.5" y="3" width="3" height="8" rx="0.5"/><rect x="10" y="3" width="3" height="8" rx="0.5"/></>,
                "half": <><rect x="1" y="3" width="5.5" height="8" rx="0.5"/><rect x="7.5" y="3" width="5.5" height="8" rx="0.5"/></>,
                "full": <rect x="1" y="3" width="12" height="8" rx="0.5"/>,
              };
              const LABELS = { "1/3": "Third width", "half": "Half width", "full": "Full width" };
              return (
                <div className="opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-0.5 mr-1 border-r border-slate-200 pr-1">
                  {allowed.map(s => <SizeBtn key={s} size={s} label={LABELS[s]} bars={ICONS[s]} />)}
                </div>
              );
            })()}
            {added && <span className="text-[10px] uppercase tracking-wide font-semibold px-1.5 py-0.5 rounded bg-blue-50 text-blue-700 border border-blue-200">Added</span>}
            {onRemove && (
              <button onClick={onRemove}
                className="p-1 rounded text-slate-400 hover:text-rose-600 hover:bg-rose-50 focus-ring transition-colors"
                title="Remove from dashboard">{I.x}</button>
            )}
          </div>
        </div>
      )}
      {widget.type === "kpi"   && <KPIRow kpis={widget.kpis} />}
      {widget.type === "line"  && <LineChart series={widget.series} xLabels={widget.xLabels || []} anomalies={widget.anomalies || []} forecastIndex={widget.forecastIndex ?? null} onDrill={onDrill} />}
      {widget.type === "hbar"  && <HBarChart data={widget.bars} onDrill={onDrill} />}
      {widget.type === "donut" && <Donut data={widget.slices} onDrill={onDrill} />}
      {widget.type === "table"  && <DataTable columns={widget.columns} rows={widget.rows} />}
      {widget.type === "gauge"  && <Gauge value={widget.value} color={widget.color} caption={widget.caption} />}
      {widget.type === "sankey" && <Sankey columns={widget.columns} links={widget.links} />}
      {widget.type === "map"    && <GeoBubbleMap points={widget.points} />}
      {widget.insight && (
        <div className="mt-3 pt-3 border-t border-slate-100 flex gap-2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75} strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5 text-blue-500 flex-shrink-0 mt-0.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
          </svg>
          <p className="text-[12px] text-slate-500 leading-relaxed">{widget.insight}</p>
        </div>
      )}
      {replaceMode && (
        <div className="absolute inset-0 rounded-xl bg-blue-500/0 hover:bg-blue-500/10 transition-colors flex items-start justify-center pt-3 pointer-events-none">
          <span className="opacity-0 group-hover:opacity-100 transition-opacity text-[12px] font-semibold text-white bg-blue-600 px-2.5 py-1 rounded-md shadow-md">
            Replace with this
          </span>
        </div>
      )}
    </div>
  );
}
